async function stravaCall(body) {
  const { data, error } = await db.functions.invoke("strava", { body });
  if (error && error.context && typeof error.context.json === "function") {

  }

  return data;
}
const round2 = v => v == null ? null : Math.round(v*100)/100;
const median = arr => { const s=[...arr].sort((x,y)=>x-y); return s.length ? s[Math.floor(s.length/2)] : null; };
// Del økten i rolig (gange) og raskt (løp) via 1D 2-means på fart; median fart + puls per gruppe
function splitStrava(velocity, heartrate) {
  velocity = velocity || [];
  const idx = [];
  for (let i=0;i<velocity.length;i++) { if (velocity[i]*3.6 > 1.5) idx.push(i); }
  if (idx.length < 6) return null;
  const kmh = idx.map(i => velocity[i]*3.6);
  let a = Math.min(...kmh), b = Math.max(...kmh);
  for (let it=0; it<25; it++) {
    const ga=[], gb=[];
    for (const v of kmh) (Math.abs(v-a)<=Math.abs(v-b)?ga:gb).push(v);
    if (!ga.length || !gb.length) break;
    const na=ga.reduce((x,y)=>x+y,0)/ga.length, nb=gb.reduce((x,y)=>x+y,0)/gb.length;
    if (Math.abs(na-a)<0.01 && Math.abs(nb-b)<0.01) { a=na; b=nb; break; }
    a=na; b=nb;
  }
  const slowC=Math.min(a,b), fastC=Math.max(a,b);
  const sK=[], fK=[], sH=[], fH=[];
  for (const i of idx) {
    const v = velocity[i]*3.6;
    const hr = heartrate && heartrate[i];
    if (Math.abs(v-slowC) <= Math.abs(v-fastC)) { sK.push(v); if (hr) sH.push(hr); }
    else { fK.push(v); if (hr) fH.push(hr); }
  }
  // "Jevn fart": kutt opp-/nedbremsing ved å ta et persentil mot platået
  // (rask gruppe → høyt persentil = jevn løpefart; rolig gruppe → lavt persentil = jevn gå-fart)
  const pct = (arr, p) => { const s=[...arr].sort((a,b)=>a-b); return s.length ? s[Math.min(s.length-1, Math.max(0, Math.round(p*(s.length-1))))] : null; };
  return {
    easy_kmh: round2(pct(sK, 0.25)),
    work_kmh: round2(pct(fK, 0.75)),
    easy_hr: sH.length ? Math.round(median(sH)) : null,
    work_hr: fH.length ? Math.round(median(fH)) : null,
  };
}

const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

// Rangering av intensitet (lav = rolig, høy = hardt) – brukes til å velge fart-felt
const IRANK = { hvile:0, pause:0, gange:1, rask_gange:2, lett_jogg_gange:2, svart_lett_jogg:3, rolig_lop:4, lett_jogg:4, jogg:5, litt_raskere:6, rask_jogg:6, styrke:6, terskel:7, test:8 };
const irank = k => (IRANK[k] ?? 4);

// ─── GYLNE SONEN (% av makspuls) ───────────────────────────────────────────────
// Terskel (80-87%) er hentet direkte fra boken («Den gylne sonen»). De andre er
// interpolert mellom bokens ankerpunkter (60% lett / 70% rolig / 80% terskel start
// / 100% maks) ut fra intensitetsrekkefølgen appen allerede bruker (IRANK).
const HR_ZONES = {
  gange:            [55,62],
  rask_gange:       [60,65],
  lett_jogg_gange:  [60,65],
  svart_lett_jogg:  [62,67],
  rolig_lop:        [67,72],
  lett_jogg:        [67,72],
  jogg:             [72,77],
  litt_raskere:     [75,80],
  rask_jogg:        [75,80],
  terskel:          [80,87],
  test:             [90,100],
};
// ─── OLYMPIATOPPENS 5-SONERSMODELL (% av makspuls) ───────────────────────────
// KUN til visning, så tallene kan følges på klokka. Treningsmålene i appen kommer
// fortsatt fra bokas ankerpunkter over (60 lett / 70 rolig / 80-87 terskel / 100
// maks) – boka bruker en glidende skala, ikke soner 1-5, og programmet er bygget
// på boka. NB: bokas terskel (80-87 %) ligger i sone 2-3 hos Olympiatoppen, som
// kaller sone 4 «anaerob terskel». Det er to ulike modeller, ikke en feil.
const OT_ZONES = [
  { n: 1, pct: [55, 72],  label: "Svært lett",  note: "pratefart" },
  { n: 2, pct: [72, 82],  label: "Rolig",       note: "moderat langkjøring" },
  { n: 3, pct: [82, 87],  label: "Moderat",     note: "opp mot anaerob terskel" },
  { n: 4, pct: [87, 92],  label: "Hard",        note: "anaerob terskel og intervaller" },
  { n: 5, pct: [92, 100], label: "Maksimalt",   note: "svært harde intervaller" },
];
const otZone = p => OT_ZONES.find(z => p < z.pct[1]) || OT_ZONES[OT_ZONES.length - 1];
// Et intensitets-%-intervall kan krysse en sonegrense. Vi merker etter sonen som
// DOMINERER intervallet, ikke som et spenn: bokas terskel (80-87 %) ligger 5 av 7
// prosentpoeng i sone 3 og bare 2 i sone 2, så «sone 2–3» ga sone 2 altfor mye vekt.
// Samme regel brukes i ukesfordelingen, så merkingen er lik overalt.
function otZoneFor(pct) {
  if (!pct) return null;
  let best = OT_ZONES[0], bestOverlap = -Infinity;
  for (const z of OT_ZONES) {
    const ov = Math.min(pct[1], z.pct[1]) - Math.max(pct[0], z.pct[0]);
    if (ov > bestOverlap) { bestOverlap = ov; best = z; }
  }
  return best;
}
function otZoneLabel(pct) {
  const z = otZoneFor(pct);
  return z ? `Sone ${z.n}` : null;
}
const otZoneText = intensity => otZoneLabel(HR_ZONES[intensity]) || "";

// Returnerer { pct:[min,max], bpm:[min,max] } eller null (f.eks. for pause/hvile,
// eller hvis makspuls ikke er fylt inn ennå)
function hrZone(intensity, maxHR) {
  const pct = HR_ZONES[intensity];
  if (!pct || !maxHR) return null;
  return { pct, bpm: [Math.round(pct[0]/100*maxHR), Math.round(pct[1]/100*maxHR)] };
}

// ─── FARTSKALKULATOR (fartsjustering for intervall-drag) ──────────────────────
// Reverse-engineert og verifisert mot 100daymarathon.com/qr/fartskalkulator
// (ren klient-side JS der, ingen backend/API – testet ~30 kombinasjoner for å
// bekrefte brytningspunkt og avrunding). Jo lengre drag, jo mer konservativ fart
// i forhold til grunnfarten (terskelfart). NB: siden sin egen tekst sier "4-5 min"
// og "8-12 min", men de faktiske brytningspunktene i koden er 3:00 og 5:00.
function paceAdjustPct(intervalSec) {
  if (intervalSec <= 60) return [-1, 1];      // ±1 %, symmetrisk
  if (intervalSec <= 180) return [1, 3];      // 1-3 % roligere
  if (intervalSec <= 300) return [3, 6];      // 3-6 % roligere
  return [6, 9];                               // 6-9 % roligere (tak, øker ikke videre)
}
// Returnerer { kmh:[lav,høy], pace:[lav,høy] (mm:ss) } eller null uten terskelfart/gyldig lengde
function paceZone(intervalSec, thresholdKmh) {
  if (!thresholdKmh || !intervalSec) return null;
  const basePaceSec = 3600 / thresholdKmh;
  const [pctLo, pctHi] = paceAdjustPct(intervalSec);
  // Lavest %-justering gir raskest fart (kortest pace-tid) og omvendt
  const paceFast = Math.round(basePaceSec * (1 + pctLo/100));
  const paceSlow = Math.round(basePaceSec * (1 + pctHi/100));
  const toStr = s => `${Math.floor(s/60)}:${pad(s%60)}`;
  const toKmh = s => Math.round((3600/s)*10)/10;
  return { pace: [toStr(paceFast), toStr(paceSlow)], kmh: [toKmh(paceSlow), toKmh(paceFast)] };
}

// Finn de to relevante fartene i en økt: rolig/restitusjon og arbeid/hardt
function sessionPaces(session) {
  const easyC = [], workC = [];
  session.segments.forEach(seg => {
    if (seg.kind === "intervals") {
      workC.push(seg.work.intensity);
      easyC.push(seg.rest.intensity);
    } else if (seg.kind === "continuous") {
      (irank(seg.intensity) >= 5 ? workC : easyC).push(seg.intensity);
    } else if (seg.kind === "warmup" || seg.kind === "cooldown") {
      easyC.push(seg.intensity);
    }
  });
  let work = workC.length ? workC.reduce((a,b)=> irank(b) > irank(a) ? b : a) : null;
  let easyPool = easyC.filter(i => i !== "pause" && i !== "hvile");
  if (!easyPool.length) easyPool = easyC;
  let easy = easyPool.length ? easyPool.reduce((a,b)=> irank(b) < irank(a) ? b : a) : null;
  if (work && work === easy) work = null;
  return { easy, work };
}

// ─── BOKAS TEMPOGUIDE (sek/km, for genererte program – erstatter %-kalkulatoren) ─
// 45 sek-1 min: 5-7 sek/km RASKERE enn terskel · 4-5 min: = terskelfart ·
// 6-8 min: 5-7 sek/km saktere · 10-15 min: 7-10 sek/km saktere.
// Mellom ankerpunktene: lineær interpolasjon, rundet til nærmeste 1 sek/km.
// Under 45 sek: 45 sek-verdien. Over 15 min: 10-15 min-verdien (tak).
const PACE_GUIDE = [            // [fraSec, tilSec, [justLo, justHi]] – negativ = raskere
  [45, 60, [-7, -5]],
  [240, 300, [0, 0]],
  [360, 480, [5, 7]],
  [600, 900, [7, 10]],
];
function paceGuideAdj(sec) {
  const first = PACE_GUIDE[0], last = PACE_GUIDE[PACE_GUIDE.length-1];
  if (sec <= first[1]) return first[2];
  if (sec >= last[0]) return last[2];
  for (let i=0; i<PACE_GUIDE.length-1; i++) {
    const a = PACE_GUIDE[i], b = PACE_GUIDE[i+1];
    if (sec >= a[0] && sec <= a[1]) return a[2];
    if (sec > a[1] && sec < b[0]) {
      const t = (sec - a[1]) / (b[0] - a[1]);
      return [Math.round(a[2][0] + t*(b[2][0]-a[2][0])), Math.round(a[2][1] + t*(b[2][1]-a[2][1]))];
    }
  }
  return last[2];
}
// Målfart for et drag: [rask, sakte] i sek/km – lagres i segmentet ved generering
function guidePaceSec(intervalSec, thresholdKmh) {
  if (!thresholdKmh || !intervalSec) return null;
  const base = Math.round(3600 / thresholdKmh);
  const [lo, hi] = paceGuideAdj(intervalSec);
  return [base + lo, base + hi];
}
// [rask, sakte] sek/km → samme form som paceZone (for visning)
function paceFromSec(secArr) {
  const toStr = s => `${Math.floor(s/60)}:${pad(s%60)}`;
  const toKmh = s => Math.round((3600/s)*10)/10;
  return { pace: [toStr(secArr[0]), toStr(secArr[1])], kmh: [toKmh(secArr[1]), toKmh(secArr[0])] };
}
// Fart for et arbeidsdrag. Prioritet:
//  1) paceGuide → bokas sek/km-guide regnet LIVE fra dagens terskelfart (egne program,
//     så farten følger progresjonen din automatisk)
//  2) paceSec → statisk lagret målfart (eldre egne program, bakt inn ved generering)
//  3) paceZone → %-kalkulatoren (12-ukers)
function workPaceZone(workSeg, thresholdKmh) {
  if (workSeg && workSeg.paceGuide) return thresholdKmh ? paceFromSec(guidePaceSec(workSeg.durationSec, thresholdKmh)) : null;
  if (workSeg && workSeg.paceSec) return paceFromSec(workSeg.paceSec);
  return workSeg ? paceZone(workSeg.durationSec, thresholdKmh) : null;
}

const DAY_OFFSET = { "Mandag":0, "Tirsdag":1, "Onsdag":2, "Torsdag":3, "Fredag":4, "Lørdag":5, "Søndag":6 };
function addDays(d, n) { const x = new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }

  const t = new Date(); t.setHours(12,0,0,0);

// Ukestruktur etter økter/uke (del 3.3): tre nøkkeløkter er grunnmuren, resten rolig påfyll
// rpw 7-8 (kap. 8, «Den ambisiøse»): egne layouts med dobbel terskel (to økter samme dag,
// morgen+kveld). doubleThreshold styrer om/når det dobles: "ingen" | "annenhver" | "full".
// weekIndex (0-basert) brukes kun av "annenhver" – dobler på partallsuker (uke 2, 4, 6 …,
// altså weekIndex 1, 3, 5 …). Layout-tuplene kan ha et 3. element: timeOfDay ("morgen"/"kveld").
function weekLayout(rpw, useX, doubleThreshold, weekIndex) {
  if (rpw <= 3) return [["Tirsdag","rolig"],["Torsdag","hoved"],["Søndag","lang"]];
  if (rpw === 4) return [["Tirsdag","stotte"],["Onsdag","rolig"],["Torsdag","hoved"],["Søndag","lang"]];
  if (rpw === 5) return useX
    ? [["Tirsdag","stotte"],["Onsdag","rolig"],["Torsdag","hoved"],["Lørdag","x"],["Søndag","lang"]]
    : [["Tirsdag","stotte"],["Onsdag","rolig"],["Torsdag","hoved"],["Lørdag","rolig"],["Søndag","lang"]];
  if (rpw === 6) return [["Mandag","rolig"],["Tirsdag","stotte"],["Onsdag","rolig"],["Torsdag","hoved"],["Lørdag","x"],["Søndag","lang"]];
  if (rpw === 7) {
    // Kap. 8, «Mellommodell». Med "annenhver" dobles tirsdag (+ kortes torsdag ned) på
    // partallsuker; med "full" dobles hver uke (samme mønster som rpw 8, men uten torsdag-dobling).
    const isDoubleWeek = doubleThreshold === "full" ? true : doubleThreshold === "annenhver" && ((weekIndex ?? 0) + 1) % 2 === 0;
    if (isDoubleWeek) {
      return [
        ["Mandag","rolig_lett"],
        ["Tirsdag","stotte_amb_am","morgen"],
        ["Tirsdag","stotte_amb_pm","kveld"],
        ["Onsdag","rolig_amb7"],
        ["Torsdag","hoved_amb_kort"],
        ["Lørdag","x"],
        ["Søndag","lang"],
      ];
    }
    return [
      ["Mandag","rolig_lett"],
      ["Tirsdag","stotte_amb"],
      ["Onsdag","rolig_amb7"],
      ["Torsdag","hoved_amb"],
      ["Lørdag","x"],
      ["Søndag","lang"],
    ];
  }
  // rpw >= 8: kap. 8, «Full dobbel terskel» – dobling hver uke, to dager (tirsdag + torsdag).
  // Fredag er «restitusjon/hvile, avh. av lørdagens økt» i boka – utelatt som egen økt her
  // for å lande på nøyaktig 8 økter/uke (se CLAUDE.md-endringslogg for resonnementet).
  return [
    ["Mandag","rolig_amb8"],
    ["Tirsdag","hoved_amb2_am","morgen"],
    ["Tirsdag","hoved_amb2_pm","kveld"],
    ["Onsdag","rolig_lett_svaert"],
    ["Torsdag","stotte_amb2_am","morgen"],
    ["Torsdag","stotte_amb2_pm","kveld"],
    ["Lørdag","x"],
    ["Søndag","lang"],
  ];
}
// Volumfaktor (del 3.6): ~10 %/uke oppbygging (maks 6 uker), blokk-lettuke −35 %, taper mot løpsdag.
// «manedssyklus» (kap. 8): 4-ukers syklus i stedet for lineær opptrapping – uke 1-2 volum
// (120 %), uke 3 kvalitet (90 %), uke 4 regenerering (70 %). Taper gjelder uansett modell.
function volFactor(i, n, taper, light, periodization) {
  let f;
  if (periodization === "manedssyklus") {
    const pos = i % 4;
    f = (pos === 0 || pos === 1) ? 1.2 : pos === 2 ? 0.9 : 0.7;
  } else {
    f = Math.min(1 + 0.10 * Math.min(i, 6), 1.5);
    if (light) f *= 0.65;
  }
  if (taper) {
    const fac = { 2:[0.75,0.6], 3:[0.8,0.7,0.55], 4:[0.85,0.75,0.65,0.55] }[taper];
    const idx = i - (n - taper);
    if (fac && idx >= 0 && idx < fac.length) f *= fac[idx];
  }
  return f;
}
// Styrke-plassering (del 6.4): ved en allerede hard dag, aldri hviledag. C = etter X (default)
function strengthPlacementDays(layout, placement, perWeek) {
  if (!perWeek) return [];
  // Prefiks-match ("hoved_amb2_am".startsWith("hoved_")) så rpw 7-8 sine nye kinds (som ikke
  // heter nøyaktig "hoved"/"stotte") fortsatt gjenkjennes som hoved-/støttedag for plassering.
  const dayOf = kind => { const e = layout.find(x => x[1] === kind || x[1].startsWith(kind + "_")); return e ? e[0] : null; };
  const hoved = dayOf("hoved"), stotte = dayOf("stotte"), x = dayOf("x");
  let first;
  if (placement === "A") first = hoved;
  else if (placement === "B") { // dagen før terskeldag – bruk støttedagen hvis den er dagen før, ellers hoveddagen
    first = stotte && hoved && (DAY_OFFSET[hoved] - DAY_OFFSET[stotte] === 1) ? stotte : hoved;
  } else first = x || hoved; // C: etter X-økt, fallback hoveddag når X ikke finnes
  const days = [first];
  if (perWeek >= 2) {
    const second = [stotte, hoved, x].find(d => d && d !== first);
    if (second) days.push(second);
  }
  return days.filter(Boolean);
}
function buildRunSession(id, day, plannedDate, kind, ctx, timeOfDay) {
  const { thr, f, i, n, meta, periodization, taper } = ctx;
  const rmin = (m, fac) => Math.max(20, Math.round(m*(fac ?? f)/5)*5); // minutter → skalert, rundet til 5
  const seg = [];
  let optional = false;
  if (kind === "rolig") {

    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 300 });

    seg.push({ kind: "intervals", repeatsRange: [10,12], work: { intensity: "terskel", durationSec: 180, paceGuide: true }, rest: { intensity: "lett_jogg_gange", durationSec: 60 } });
    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 300 });

    const reps = [Math.round(15 + prog*3), Math.round(18 + prog*2)];
    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 600 });
    seg.push({ kind: "intervals", repeatsRange: reps, work: { intensity: "rask_jogg", durationSec: 45, paceGuide: true }, rest: { intensity: "pause", durationSec: 15 }, note: "start i 10 km-fart, øk gradvis mot 5 km-fart" });
    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 300 });
  } else if (kind === "rolig_lett") {

    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 600 });

    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 600 });

    optional = true;

  } else if (kind === "hoved_amb2_am") {

    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 600 });
    seg.push({ kind: "intervals", repeatsRange: [5,6], work: { intensity: "terskel", durationSec: 360, paceGuide: true }, rest: { intensity: "lett_jogg", durationSec: 60 } });
    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 300 });
  } else if (kind === "hoved_amb2_pm") {

    // kortere/enklere enn morgenøkta
    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 300 });
    seg.push({ kind: "intervals", repeatsRange: [20,25], work: { intensity: "terskel", durationSec: 60, paceGuide: true }, rest: { intensity: "pause", durationSec: 30 }, note: "kveldsøkt – kortere og enklere enn morgenøkta" });
    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 180 });
  } else if (kind === "stotte_amb2_am") {
    // Kap. 8, full dobbel (rpw 8), torsdag morgen (dobbel terskel dag 2): «3 x 10 min terskel,
    // 90 sek pause». Fast antall – se begrunnelse ved "stotte_amb".
    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 600 });
    seg.push({ kind: "intervals", repeats: 3, work: { intensity: "terskel", durationSec: 600, paceGuide: true }, rest: { intensity: "lett_jogg", durationSec: 90 } });
    seg.push({ kind: "cooldown", intensity: "lett_jogg", durationSec: 300 });
  } else if (kind === "stotte_amb2_pm") {
    // Kap. 8, full dobbel (rpw 8), torsdag kveld (dag 2): «15 x 90 sek lett progressiv, 30 sek
    // pause» – kortere/enklere enn morgenøkta. Fast antall – se begrunnelse ved "stotte_amb".
    seg.push({ kind: "warmup", intensity: "lett_jogg", durationSec: 300 });
    seg.push({ kind: "intervals", repeats: 15, work: { intensity: "terskel", durationSec: 90, paceGuide: true }, rest: { intensity: "pause", durationSec: 30 }, note: "lett progressiv – kveldsøkt, kortere og enklere enn morgenøkta" });

// Ukens intensitetsfordeling (for info-linjen og 80/20-innsyn). Snitt av ranges.
function weekDistribution(sessions) {
  let easy = 0, thrS = 0, hard = 0;
  sessions.forEach(s => {
    if (s.type === "strength") return;
    s.segments.forEach(seg => {
      const add = (int, sec) => { if (int === "terskel") thrS += sec; else if (INTENSITY[int] && INTENSITY[int].hard) hard += sec; else easy += sec; };
      if (seg.kind === "intervals") {
        const nrep = seg.repeatsRange ? (seg.repeatsRange[0]+seg.repeatsRange[1])/2 : seg.repeats;
        add(seg.work.intensity, nrep*seg.work.durationSec); add(seg.rest.intensity, nrep*seg.rest.durationSec);
      } else if (seg.durationRangeSec) add(seg.intensity, (seg.durationRangeSec[0]+seg.durationRangeSec[1])/2);
      else if (seg.durationSec) add(seg.intensity, seg.durationSec);
    });
  });
  const total = easy + thrS + hard;
  const p = v => total ? Math.round(v/total*100) : 0;
  return { total, easyPct: p(easy), thrPct: p(thrS), hardPct: p(hard) };
}
function weekPhase(i, n, taper, light, periodization) {
  if (taper && i >= n - taper) return "Nedtrapping";
  if (periodization === "manedssyklus") {
    const pos = i % 4;
    return (pos === 0 || pos === 1) ? "Volum" : pos === 2 ? "Kvalitet" : "Regenerering";
  }
  if (light) return "Lett uke";
  if (i < Math.ceil(n*0.4)) return "Oppbygging";
  return periodization === "progressiv_x" ? "Spissing" : "Utvikling";
}
function weekTitle(i, n, taper, light, periodization) {
  if (taper && i >= n - taper) return i === n-1 ? "Løpsuke – lett og kvikk" : "Nedtrapping – mindre volum, behold litt intensitet";
  if (periodization === "manedssyklus") {
    const pos = i % 4;
    return (pos === 0 || pos === 1) ? "Volumuke – 120 % lengde, nøkkeløktene står stabilt"
      : pos === 2 ? "Kvalitetsuke – 90 % volum, mer vekt på kvalitetsøktene"
      : "Regenerering – 70 % volum, hent deg inn før neste syklus";
  }
  if (light) return "Lett uke – hent deg inn (−35 % volum)";
  if (i === 0) return "Første uke – etabler rytmen";
  return "Bygg videre – rolig volum opp, nøkkeløktene står";
}
// Hovedgeneratoren: produserer uker i NØYAKTIG samme format som PROGRAM.weeks
function generateProgram(o, pid) {
  const meta = GOAL_META[o.goal];
  const thr = o.thresholdKmh || null;
  const start = nextMonday();
  const goalDate = o.goalDate ? parseKey(o.goalDate) : null;
  const n = goalDate
    ? Math.max(4, Math.round((goalDate.getTime() - start.getTime()) / (7*86400000)))
    : Math.max(4, Math.min(24, o.weeksCount || 8));
  const useX = o.runsPerWeek >= 6 || (o.runsPerWeek === 5 && o.periodization === "progressiv_x");
  const doubleThreshold = o.doubleThreshold || "ingen";
  const taper = meta.race && goalDate ? Math.min(meta.taper, Math.max(0, n-2)) : 0;
  const weeks = [];
  for (let i=0; i<n; i++) {
    // Layouten regnes ut PER uke (ikke én gang for hele programmet): rpw 7 med "annenhver"
    // dobler kun på partallsuker, så layouten kan variere fra uke til uke. For rpw 3-6 og 8
    // returnerer weekLayout uansett samme, statiske array hver gang (uendret oppførsel).
    const layout = weekLayout(o.runsPerWeek, useX, doubleThreshold, i);
    const light = o.periodization === "blokk" && (i%3) === 2 && i < n - taper;
    const f = volFactor(i, n, taper, light, o.periodization);
    const ctx = { thr, f, i, n, meta, periodization: o.periodization, taper };
    const sessions = [];
    let k = 0;
    layout.forEach(([day, kind, timeOfDay]) => {
      k++;
      const plannedDate = dateKey(addDays(start, i*7 + DAY_OFFSET[day]));
      if (goalDate && parseKey(plannedDate) >= goalDate) return; // løpsdagen tar over
      if (light && kind === "x") return; // lett uke: X-økta droppes først (sikkerhetsventilen)
      sessions.push(buildRunSession(`g${pid}-u${i+1}-${k}`, day, plannedDate, kind, ctx, timeOfDay));
    });
    strengthPlacementDays(layout, o.strengthPlacement || "C", o.strengthPerWeek).forEach((day, si) => {
      const plannedDate = dateKey(addDays(start, i*7 + DAY_OFFSET[day]));
      if (goalDate && parseKey(plannedDate) >= goalDate) return;
      if (taper && i >= n - taper && si > 0) return; // nedtrapping: maks 1 styrkeøkt/uke
      sessions.push(strengthSession(`g${pid}-u${i+1}-s${si+1}`, day, plannedDate));
    });
    sessions.sort((a,b) => DAY_OFFSET[a.plannedDay] - DAY_OFFSET[b.plannedDay]);
    weeks.push({
      week: i+1,
      phase: weekPhase(i, n, taper, light, o.periodization),
      title: weekTitle(i, n, taper, light, o.periodization),
      info: (d => d.total ? `Ca. ${Math.round(d.total/3600*10)/10} t løping · ${d.easyPct} % rolig · ${d.thrPct} % terskel · ${d.hardPct} % høy intensitet` : "")(weekDistribution(sessions)),
      sessions,
    });
  }
  if (goalDate && meta.race) {
    const wk = weeks[Math.min(n-1, Math.max(0, Math.floor((goalDate.getTime()-start.getTime())/(7*86400000))))];
    wk.sessions.push({
      id: `g${pid}-race`, plannedDay: WEEKDAYS[goalDate.getDay()], plannedDate: dateKey(goalDate), optional: false,
      segments: [
        { kind: "warmup", intensity: "lett_jogg", durationSec: 600 },
        { kind: "test", note: `Løpsdag: ${meta.label}! Start kontrollert, avslutt sterkt. Lykke til!` },
      ],
    });
    wk.sessions.sort((a,b) => DAY_OFFSET[a.plannedDay] - DAY_OFFSET[b.plannedDay]);
  }
  return { weeks, startDate: dateKey(start), weeksCount: n, doubleThreshold };
}
function programSessions(prog) {
  const out = [];
  ((prog.program_json && prog.program_json.weeks) || []).forEach(w => w.sessions.forEach(s => out.push({ ...s, week: w.week, programId: prog.id })));
  return out;
}

// ─── TRAFIKKLYS (kap. 12): Whoop recovery + manuell fallback ──────────────────
const READINESS = {
  gronn: { dot: "#34c759", label: "Grønt lys",  advice: "Overskudd – du kan forlenge dagens nøkkeløkt 30–40 % (legg til drag eller forleng siste del)." },
  gul:   { dot: "#ffcc00", label: "Gult lys",   advice: "Normal dag – gjennomfør økten som planlagt." },
  rod:   { dot: "#ff3b30", label: "Rødt lys",   advice: "Kroppen er ikke klar – anbefaler 1 dag fri, deretter rolig økt før normal belastning. X-økta ryker først." },
};
function recoveryColor(score) { return score >= 67 ? "gronn" : score >= 34 ? "gul" : "rod"; }
// Manuell sjekk: alle gode → grønn · én eller flere klart avvikende → rød · ellers gul
function manualColor(a) {
  const v = [a.hvilepuls, a.trapp, a.bein];
  if (v.some(x => x === "avvik")) return "rod";
  if (v.every(x => x === "god")) return "gronn";
  return "gul";
}
function readinessReason(r) {
  if (!r) return "";
  if (r.source === "whoop") return `Whoop recovery ${r.recovery_score}%${r.resting_hr ? ` · hvilepuls ${r.resting_hr}` : ""}${r.sleep_pct ? ` · søvn ${r.sleep_pct}%` : ""}`;
  return "manuell sjekk (hvilepuls, trappetest, beinfølelse)";
}
function isHardSession(s) {
  if (s.type === "strength") return true;
  return s.segments.some(seg =>
    (seg.kind === "intervals" && INTENSITY[seg.work.intensity] && INTENSITY[seg.work.intensity].hard) ||
    (seg.kind === "continuous" && INTENSITY[seg.intensity] && INTENSITY[seg.intensity].hard));
}

// ─── MOTIVASJON (A2): streaks, milepæler, 10-dagers-regelen ───────────────────
const MILESTONES = [5, 10, 25, 50, 75, 100, 150, 200];
function computeStreak(log) {
  const wk = new Set();
  Object.values(log).forEach(r => { if (r && r.done && r.done_date) wk.add(weekMondayKey(r.done_date)); });
  if (!wk.size) return 0;
  let cur = weekMondayKey(todayKey());
  if (!wk.has(cur)) cur = dateKey(addDays(parseKey(cur), -7)); // inneværende uke kan være påbegynt
  let streak = 0;
  while (wk.has(cur)) { streak++; cur = dateKey(addDays(parseKey(cur), -7)); }
  return streak;
}
// 10-dagers-regelen: minst én økt bør føles skikkelig god (RPE ≤ 4 / «lett») innen 10 dager
function tenDayWarning(log) {
  const cutoff = addDays(new Date(), -10);
  const rated = Object.values(log).filter(r => r && r.done && r.done_date && parseKey(r.done_date) >= cutoff && (r.rpe != null || r.feeling));
  if (rated.length < 2) return false;
  return !rated.some(r => (r.rpe != null && r.rpe <= 4) || r.feeling === "lett");
}

// ─── STRAVA-LIMETEKST (del 7): faktisk fart fra Strava, min/km, kopierbar ─────
function stravaPasteText(session, rec, thresholdKmh) {
  const segDur = seg => seg.durationRangeSec ? durRangeText(seg.durationRangeSec) : durText(seg.durationSec);
  if (session.type === "strength") {
    return `Styrke for løpere, ca. ${sessionMinutes(session)} min: Myrtl-oppvarming + ${STRENGTH_EXERCISES.length} øvelser (enbens-styrke, legger, hamstring, hofte/kjerne)`;
  }
  const workKmh = rec && rec.threshold_kmh, easyKmh = rec && rec.easy_kmh;
  let usedGoal = false;
  const workPace = (w) => {
    if (workKmh) return ` @ ${kmhToPace(workKmh)}`;
    const z = workPaceZone(w, thresholdKmh);
    if (!z) return "";
    usedGoal = true;
    return ` @ ${z.pace[0] === z.pace[1] ? z.pace[0] : `${z.pace[0]}-${z.pace[1]}`}`;
  };
  const parts = session.segments.map(seg => {
    if (seg.kind === "warmup") return `${segDur(seg)} oppvarming`;
    if (seg.kind === "cooldown") return `${segDur(seg)} nedjogg`;
    if (seg.kind === "intervals") {
      const nrep = seg.repeatsRange ? seg.repeatsRange[1] : seg.repeats;
      return `${nrep} x ${durText(seg.work.durationSec)} ${iLabel(seg.work.intensity)}${workPace(seg.work)}`;
    }
    if (seg.kind === "continuous") {
      const e = easyKmh && !(INTENSITY[seg.intensity] && INTENSITY[seg.intensity].hard) ? ` @ ${kmhToPace(easyKmh)}` : "";
      return `${segDur(seg)} ${iLabel(seg.intensity)}${e}`;
    }
    if (seg.kind === "test") return seg.note || "test";
    return null;
  }).filter(Boolean);
  const prefix = session.timeOfDay ? `(${session.timeOfDay}) ` : ""; // dobbel terskel: skill morgen/kveld i limeteksten
  return prefix + parts.join(", ") + (usedGoal ? " (mål)" : "");
}

// ─── HJELPERE ─────────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function parseKey(key) {
  const p = key.split("-");
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]), 12, 0, 0);
}
const pad = n => String(n).padStart(2, "0");
const WEEKDAYS = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
const weekdayName = (dateStr) => { if (!dateStr) return null; const d = parseKey(dateStr); return WEEKDAYS[d.getDay()]; };
// Fullført økt viser faktisk ukedag (fra dato); ellers planlagt dag. Dobbel terskel (kap. 8,
// rpw 7-8): to økter samme dag skiller seg kun ved timeOfDay ("morgen"/"kveld") – uten denne
// etiketten ville de sett identiske ut i uke-/øktlister.
const displayDay = (session, rec) => {
  const day = (rec && rec.done && rec.done_date) ? (weekdayName(rec.done_date) || session.plannedDay) : session.plannedDay;
  return session.timeOfDay ? `${day} (${session.timeOfDay})` : day;
};

// Varighet → tekst (matcher bokas stil: "90 sek", "2 min", "7:30 min")
function durText(sec) {
  if (sec % 60 === 0 && sec >= 120) return `${sec/60} min`;
  if (sec < 120) return `${sec} sek`;
  return `${Math.floor(sec/60)}:${pad(sec%60)} min`;
}
function durRangeText(range) {
  const a = durText(range[0]), b = durText(range[1]);
  const ua = a.split(" ").pop(), ub = b.split(" ").pop();
  if (ua === ub) return `${a.split(" ")[0]}–${b.split(" ")[0]} ${ub}`;
  return `${a}–${b}`;
}
function repText(seg) { return seg.repeatsRange ? `${seg.repeatsRange[0]}–${seg.repeatsRange[1]}` : `${seg.repeats}`; }

// Bygg bokas linje fra segmenter, f.eks. "5 min rask gange + 8 × (30 sek lett jogg / 90 sek gange) + 5 min rolig gange"
function segmentSummary(session) {
  return session.segments.map(seg => {
    if (seg.kind === "intervals") {
      const w = seg.work, r = seg.rest;
      return `${repText(seg)} × (${durText(w.durationSec)} ${iLabel(w.intensity)} / ${durText(r.durationSec)} ${iLabel(r.intensity)})`;
    }
    if (seg.kind === "continuous") {
      const d = seg.durationRangeSec ? durRangeText(seg.durationRangeSec) : durText(seg.durationSec);
      return `${d} ${iLabel(seg.intensity)}${seg.orRest ? " eller hvile" : ""}`;
    }
    if (seg.kind === "test") return seg.note || "Test";
    if (seg.kind === "strength_ex") {
      return `${seg.sets > 1 ? `${seg.sets} × ` : ""}${durText(seg.workSec)} ${seg.name}`;
    }
    // warmup / cooldown
    const d = seg.durationRangeSec ? durRangeText(seg.durationRangeSec) : durText(seg.durationSec);
    const suffix = seg.kind === "warmup" ? "" : "";
    return `${d} ${iLabel(seg.intensity)}`;
  }).join(" + ");
}

// Estimert total tid (min) – bruker nedre grense for ranges
function sessionMinutes(session) {
  let s = 0;
  session.segments.forEach(seg => {
    if (seg.kind === "intervals") {
      const n = seg.repeatsRange ? seg.repeatsRange[0] : seg.repeats;
      s += n * (seg.work.durationSec + seg.rest.durationSec);
    } else if (seg.kind === "continuous") {
      s += seg.durationRangeSec ? seg.durationRangeSec[0] : seg.durationSec;
    } else if (seg.kind === "strength_ex") {
      s += seg.sets * (seg.workSec + (seg.restSec || 0));
    } else if (seg.durationRangeSec) { s += seg.durationRangeSec[0]; }
    else if (seg.durationSec) { s += seg.durationSec; }
  });
  return Math.round(s/60);
}

// ─── UKESESTIMAT: tid per intensitet, tid per pulssone, estimert distanse ─────
// Alt bygger på PLANLAGTE segmenter (nedre grense for ranges, som sessionMinutes),
// og på DINE EGNE loggede farter. Mangler farten, vises ingen km – ingen antatte tall.
function intensitySeconds(session) {
  const m = {};
  const add = (intensity, sec) => { if (!intensity || !sec) return; m[intensity] = (m[intensity] || 0) + sec; };
  session.segments.forEach(seg => {
    if (seg.kind === "intervals") {
      const n = seg.repeatsRange ? seg.repeatsRange[0] : seg.repeats;
      add(seg.work.intensity, n * seg.work.durationSec);
      add(seg.rest.intensity, n * seg.rest.durationSec);
    } else if (seg.kind === "strength_ex") {
      add("styrke", seg.sets * (seg.workSec + (seg.restSec || 0)));
    } else {
      add(seg.intensity, seg.durationRangeSec ? seg.durationRangeSec[0] : seg.durationSec);
    }
  });
  return m;
}
// Median av egne loggede farter. work_kmh (rask klynge) = løpefart, easy_kmh = gangfart.
function measuredSpeeds(log) {
  const run = [], walk = [];
  Object.values(log || {}).forEach(r => {
    if (!r || !r.done) return;
    if (r.threshold_kmh > 0) run.push(r.threshold_kmh);
    if (r.easy_kmh > 0) walk.push(r.easy_kmh);
  });
  return { run: run.length ? median(run) : null, walk: walk.length ? median(walk) : null, n: run.length };
}
function estKmh(intensity, sp, thresholdKmh) {
  if (intensity === "pause" || intensity === "hvile" || intensity === "styrke") return 0;
  const rank = irank(intensity);
  if (rank <= 2) return sp.walk;                      // gange / rask gange
  if (rank >= 7) return thresholdKmh || sp.run;       // terskel / test
  return sp.run;                                      // jogg / rolig løp
}
function weekEstimate(sessions, log, thresholdKmh) {
  const sp = measuredSpeeds(log);
  const secs = {};
  sessions.forEach(s => { const m = intensitySeconds(s); for (const k in m) secs[k] = (secs[k] || 0) + m[k]; });
  let totalSec = 0, meters = 0, restSec = 0, missing = false;
  // Fordeling på Olympiatoppens soner: hver intensitet plasseres etter midtpunktet
  // i bokas puls-range for den intensiteten.
  const bands = OT_ZONES.map(z => ({ ...z, sec: 0 }));
  for (const k in secs) {
    const sec = secs[k];
    totalSec += sec;
    const kmh = estKmh(k, sp, thresholdKmh);
    if (kmh == null) missing = true; else meters += (sec / 3600) * kmh * 1000;
    const z = HR_ZONES[k];
    if (z) bands[otZoneFor(z).n - 1].sec += sec;
    else restSec += sec;   // pause/hvile/styrke – ingen pulssone i boka
  }
  return { minutes: Math.round(totalSec / 60), km: missing ? null : Math.round(meters / 100) / 10,
           bands: bands.filter(b => b.sec > 0), restSec, speeds: sp };
}

// Fart-konvertering (kanonisk = km/t)
function kmhToPace(kmh) {
  if (!kmh || kmh <= 0) return "";
  const tot = Math.round(3600/kmh);
  return `${Math.floor(tot/60)}:${pad(tot%60)}`;
}
function paceToKmh(str) {
  const m = String(str).trim().match(/^(\d{1,2}):(\d{1,2})$/);
  if (!m) return null;
  const sec = parseInt(m[1])*60 + parseInt(m[2]);
  if (sec <= 0) return null;
  return Math.round((3600/sec)*100)/100;
}
function fmtSpeed(kmh, unit) {
  if (kmh == null) return "–";
  return unit === "pace" ? `${kmhToPace(kmh)} /km` : `${kmh} km/t`;
}

function allSessions() {
  const out = [];
  PROGRAM.weeks.forEach(w => w.sessions.forEach(s => out.push({ ...s, week: w.week })));
  return out;
}

// ─── LYD ──────────────────────────────────────────────────────────────────────
function playPling(times=1, freq=880) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const play = (delayMs) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine"; osc.frequency.value = freq;
      const t = ctx.currentTime + delayMs/1000;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.4,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      osc.start(t); osc.stop(t+0.6);
    };
    for (let i=0;i<times;i++) play(i*250);
  } catch {}
}

// ─── TALE (TTS) + SKJERM ──────────────────────────────────────────────────────
let VOICES = [];
function loadVoices() {
  try { VOICES = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; } catch { VOICES = []; }
  return VOICES;
}
if (window.speechSynthesis) {
  loadVoices();
  try { window.speechSynthesis.addEventListener("voiceschanged", loadVoices); } catch {}
}
function norskVoices() {
  const all = loadVoices();
  const no = all.filter(v => /^(nb|nn|no)([-_]|$)/i.test(v.lang));
  return no.length ? no : all;
}
function setDuck(on) {
  try { if (navigator.audioSession) navigator.audioSession.type = on ? "transient" : "ambient"; } catch {}
}
function say(text, voiceURI) {
  if (!window.speechSynthesis || !text) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const list = VOICES.length ? VOICES : loadVoices();
    const v = list.find(x => x.voiceURI === voiceURI);
    if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = "nb-NO"; }
    u.rate = 1.05;
    window.speechSynthesis.speak(u);
  } catch {}
}
function durSpoken(sec) {
  if (sec < 120) return `${sec} sekunder`;
  if (sec % 60 === 0) return `${sec/60} minutter`;
  const mm = Math.floor(sec/60), ss = sec%60;
  return `${mm} minutter og ${ss} sekunder`;
}
function stepSpoken(step) {
  return `${durSpoken(step.sec)} ${iLabel(step.intensity).replace("/", "eller")}`;
}

// ─── GUIDET ØKT: bygg steg-liste ──────────────────────────────────────────────
// choices: { [segIdx]: { reps?, sec? } } – for ranges
function buildSteps(session, choices) {
  const steps = [];
  session.segments.forEach((seg, si) => {
    const ch = (choices && choices[si]) || {};
    if (seg.kind === "intervals") {
      const n = seg.repeatsRange ? (ch.reps ?? seg.repeatsRange[0]) : seg.repeats;
      for (let r=0; r<n; r++) {
        steps.push({ label: `Arbeid ${r+1}/${n}`, intensity: seg.work.intensity, sec: seg.work.durationSec, paceSec: seg.work.paceSec || null, paceGuide: seg.work.paceGuide || false, segKind: "intervals" });
        steps.push({ label: `Pause ${r+1}/${n}`, intensity: seg.rest.intensity, sec: seg.rest.durationSec, segKind: "intervals" });
      }
    } else if (seg.kind === "strength_ex") {
      for (let r=0; r<seg.sets; r++) {
        steps.push({ label: seg.sets > 1 ? `${seg.name} · sett ${r+1}/${seg.sets}` : seg.name, intensity: "styrke", sec: seg.workSec, say: `${seg.name}, ${durSpoken(seg.workSec)}`, segKind: "strength_ex" });
        if (seg.restSec) steps.push({ label: "Pause", intensity: "pause", sec: seg.restSec, say: `Pause, ${durSpoken(seg.restSec)}`, segKind: "strength_ex" });
      }
    } else if (seg.kind === "continuous") {
      const sec = seg.durationRangeSec ? (ch.sec ?? seg.durationRangeSec[0]) : seg.durationSec;
      steps.push({ label: seg.note || iLabel(seg.intensity), intensity: seg.intensity, sec, segKind: "continuous" });
    } else if (seg.kind === "warmup" || seg.kind === "cooldown") {
      const sec = seg.durationRangeSec ? (ch.sec ?? seg.durationRangeSec[0]) : seg.durationSec;
      steps.push({ label: seg.kind === "warmup" ? "Oppvarming" : "Nedjogg", intensity: seg.intensity, sec, segKind: seg.kind });
    }
    // test-segment hoppes over i guidet modus
  });
  return steps;
}

function firstCooldownIdx(arr) { for (let i=0;i<arr.length;i++) if (arr[i].segKind === "cooldown") return i; return -1; }

// ─── KOMPONENTER ──────────────────────────────────────────────────────────────

// Kort tekst med puls-mål, f.eks. " · 158-165 slag/min" – tom streng uten makspuls
function hrZoneText(intensity, maxHR) {
  const z = hrZone(intensity, maxHR);
  const ot = otZoneText(intensity);
  return z ? ` · ${z.bpm[0]}-${z.bpm[1]} slag/min${ot ? ` (${ot.toLowerCase()})` : ""}` : "";
}
// Kort tekst med anbefalt fart for et arbeidsdrag – lagret målfart (genererte
// program) foran %-kalkulatoren. Tom streng uten terskelfart/målfart.
function paceZoneText(workSeg, thresholdKmh, unit) {
  const z = workPaceZone(workSeg, thresholdKmh);
  if (!z) return "";
  if (unit === "pace") return z.pace[0] === z.pace[1] ? ` · ${z.pace[0]} /km` : ` · ${z.pace[0]}-${z.pace[1]} /km`;
  return z.kmh[0] === z.kmh[1] ? ` · ${z.kmh[0]} km/t` : ` · ${z.kmh[0]}-${z.kmh[1]} km/t`;
}

function SegmentList({ session, maxHR, thresholdKmh, unit }) {
  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:8}}>

                  ${durText(seg.work.durationSec)} ${iLabel(seg.work.intensity)}${hrZoneText(seg.work.intensity,maxHR)}${paceZoneText(seg.work,thresholdKmh,unit)} / ${durText(seg.rest.durationSec)} ${iLabel(seg.rest.intensity)}
                </p>

        if (seg.kind === "strength_ex") {

                </p>

        }
        const isTest = seg.kind === "test";

        const title = seg.kind==="warmup" ? "Oppvarming" : seg.kind==="cooldown" ? "Nedjogg" : isTest ? "Test" : "Kontinuerlig";
        return html`

            <div>

                ${isTest ? seg.note : `${iLabel(seg.intensity)}${seg.orRest?" eller hvile":""}${seg.note&&seg.note!==dur?"":""}`}${hrZoneText(seg.intensity,maxHR)}
              </p>

// Fart-input: viser km/t eller pace basert på unit
function SpeedInput({ label, kmh, unit, onChange }) {
  const fmt = (k) => unit === "pace" ? kmhToPace(k) : (k ?? "");
  const [raw, setRaw] = useState(fmt(kmh));
  const lastEmitted = useRef(kmh);
  useEffect(() => { setRaw(fmt(kmh)); }, [unit]);
  // Synk visningen når verdien endres utenfra (f.eks. hentet fra Strava)
  useEffect(() => { if (kmh !== lastEmitted.current) { setRaw(fmt(kmh)); lastEmitted.current = kmh; } }, [kmh]);
  const commit = (v) => {
    setRaw(v);
    let k = null;
    if (v !== "" && v != null) {
      if (unit === "pace") k = paceToKmh(v);
      else { const p = parseFloat(String(v).replace(",", ".")); k = isNaN(p) ? null : Math.round(p*100)/100; }
    }
    lastEmitted.current = k;
    onChange(k);
  };
  return html`
    <div style=${{flex:1}}>
      <label style=${{display:"block",fontSize:12,color:"var(--color-text-secondary)",marginBottom:5}}>${label}</label>
      <input
        type=${unit==="pace"?"text":"number"} step="0.1" inputmode=${unit==="pace"?"text":"decimal"}
        value=${raw}
        placeholder=${unit==="pace"?"mm:ss":"km/t"}
        onInput=${e=>commit(e.target.value)}
        style=${{width:"100%",boxSizing:"border-box"}}/>
      <span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}>${unit==="pace"?"min/km":"km/t"}</span>
    </div>
  `;
}

function GuidedSession({ session, choices, readiness, voiceOn, voiceURI, maxHR, thresholdKmh, unit, onExit, onFinish }) {
  const [steps, setSteps] = useState(() => buildSteps(session, choices));
  const [idx, setIdx] = useState(0);
  const [rem, setRem] = useState(steps.length ? steps[0].sec : 0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [rpe, setRpe] = useState(null);
  const [feeling, setFeeling] = useState(null);
  const [extendPrompt, setExtendPrompt] = useState(false);
  const [extendDone, setExtendDone] = useState(false);
  // Grønt lys (kap. 12) på nøkkeløkt → tilby å forlenge rett før nedjogg
  const green = readiness && readiness.color === "gronn" && isHardSession(session);
  const ivSeg = session.segments.find(s => s.kind === "intervals");
  const contSeg = ivSeg ? null : session.segments.find(s => s.kind === "continuous");
  // Hvor mye kan man forlenge? Cappet på ~40 % av hoveddelen (samme tak som konfig).
  // Intervall → antall ekstra drag (maks 6). Kontinuerlig → minutter i steg på 5.
  const extendOptions = (arr) => {
    const cool = firstCooldownIdx(arr);
    if (ivSeg) {
      const baseUpper = ivSeg.repeatsRange ? ivSeg.repeatsRange[1] : ivSeg.repeats;
      const maxTotal = Math.ceil(baseUpper * 1.4);
      const curDrag = arr.filter((s,i) => (cool < 0 || i < cool) && s.label && (s.label.indexOf("Arbeid") === 0 || s.label === "Ekstra drag")).length;
      const remaining = Math.min(6, Math.max(0, maxTotal - curDrag));
      return { kind: "drag", counts: Array.from({length: remaining}, (_,k) => k+1) };
    }
    if (contSeg) {
      const mainStep = arr.find(s => s.segKind === "continuous");
      const baseSec = mainStep ? mainStep.sec : 0;
      const capMin = Math.min(30, Math.floor((baseSec * 0.4) / 60 / 5) * 5);
      const mins = []; for (let mm = 5; mm <= capMin; mm += 5) mins.push(mm);
      return { kind: "min", counts: mins };
    }
    return { kind: null, counts: [] };
  };
  const opts = green ? extendOptions(steps) : { kind: null, counts: [] };
  const canExtend = green && firstCooldownIdx(steps) !== -1 && !extendDone && opts.counts.length > 0;
  const [locked, setLocked] = useState(false);
  const [unlockHint, setUnlockHint] = useState(false);
  const [shield, setShield] = useState(false);
  const ref = useRef(null);
  const wakeRef = useRef(null);
  const videoRef = useRef(null);
  const unlockRef = useRef(null);
  const startedRef = useRef(false);
  const runningRef = useRef(false);
  const preAnn = useRef({});
  useEffect(()=>{ runningRef.current = running; },[running]);

  // Skjermlås-fix: Wake Lock API (moderne nettlesere) + skjult videoloop som fallback
  // for eldre iOS/Safari uten støtte. Begge kjøres samtidig for best sjanse for å lykkes.
  const acquireWake = async () => {
    try { if (navigator.wakeLock) wakeRef.current = await navigator.wakeLock.request("screen"); } catch {}
    try {
      if (!videoRef.current) {
        const v = document.createElement("video");
        v.setAttribute("src", NOSLEEP_VIDEO_SRC);
        v.setAttribute("playsinline", "");
        v.setAttribute("muted", "");
        v.muted = true;
        v.loop = true;
        v.style.cssText = "position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none;";
        document.body.appendChild(v);
        videoRef.current = v;
      }
      await videoRef.current.play();
    } catch {}
  };
  const releaseWake = () => {
    try { if (wakeRef.current) { wakeRef.current.release(); wakeRef.current = null; } } catch {}
    try { if (videoRef.current) { videoRef.current.pause(); } } catch {}
  };
  const announce = (i) => { if (!voiceOn || !steps[i]) return; say(steps[i].say || stepSpoken(steps[i]), voiceURI); };

  const toggleRun = () => {
    const willRun = !running;
    if (willRun) {
      setDuck(true); acquireWake();
      try { window.speechSynthesis && window.speechSynthesis.resume(); } catch {}
      if (!startedRef.current) { startedRef.current = true; announce(idx); }
    }
    setRunning(willRun);
  };

  const doUnlock = () => { setUnlockHint(false); setLocked(false); setShield(true); setTimeout(()=>setShield(false), 700); };
  const startUnlock = () => { setUnlockHint(true); unlockRef.current = setTimeout(doUnlock, 1500); };
  const cancelUnlock = () => { setUnlockHint(false); if (unlockRef.current) clearTimeout(unlockRef.current); };

  useEffect(()=>{
    const onVis = () => { if (document.visibilityState === "visible" && runningRef.current) acquireWake(); };
    document.addEventListener("visibilitychange", onVis);
    return () => {
      document.removeEventListener("visibilitychange", onVis); clearInterval(ref.current); releaseWake(); setDuck(false);
      if (videoRef.current) { try { videoRef.current.remove(); } catch {} videoRef.current = null; }
    };
  },[]);

  useEffect(()=>{
    if (running) {
      const cur = steps[idx], nxt = steps[idx+1];
      // Rett før nedjogg med grønt lys: ikke forhåndsvarsle nedjogg – forleng-valget kommer
      const atBoundary = canExtend && nxt && nxt.segKind === "cooldown";
      ref.current = setInterval(()=>{
        if (voiceOn) { try { window.speechSynthesis && window.speechSynthesis.resume(); } catch {} }
        setRem(r=>{
          if (r <= 1) return 0;
          const nr = r-1;
          if (voiceOn) {
            if (!atBoundary && nxt && cur.sec >= 6 && nr === 5) say(nxt.say || stepSpoken(nxt), voiceURI);
            else if (cur.sec >= 6 && nr <= 3 && nr >= 1) say(String(nr), voiceURI);
          } else if (nr <= 3) { playPling(1, 660); }
          return nr;
        });
      },1000);
    } else clearInterval(ref.current);
    return ()=>clearInterval(ref.current);
  },[running, idx, voiceOn, voiceURI]);

  useEffect(()=>{ if (running && rem === 0) advance(); },[rem, running, idx]);

  function advance() {
    clearInterval(ref.current);
    const n = idx+1;
    const coolIdx = firstCooldownIdx(steps);
    // Grønt lys: rett før nedjogg, tilby å forlenge i stedet for å gå videre
    if (canExtend && n === coolIdx) {
      playPling(2, 880);
      setRunning(false); setLocked(false); setExtendPrompt(true);
      if (voiceOn) say("Økten er ferdig. Vil du forlenge, eller gå til nedjogg?", voiceURI);
      return;
    }
    if (idx < steps.length-1) {
      playPling(2, 880);
      setIdx(n); setRem(steps[n].sec);
    } else {
      playPling(3, 990);
      if (voiceOn) say("Økt fullført. Godt jobbet!", voiceURI);
      setRunning(false); setDone(true);
      releaseWake(); setDuck(false);
    }
  }

  // Forleng: sett inn valgt antall ekstra drag (eller X min) rett før nedjogg og fortsett.
  // Cappet på ~40 % via extendOptions, så man kan ikke velge mer enn taket.
  const extendBy = (amount) => {
    const coolIdx = firstCooldownIdx(steps);
    const at = coolIdx === -1 ? steps.length : coolIdx;
    const extra = [];
    if (ivSeg) {
      for (let k=0; k<amount; k++) {
        extra.push({ label: "Ekstra drag", intensity: ivSeg.work.intensity, sec: ivSeg.work.durationSec, paceSec: ivSeg.work.paceSec || null, paceGuide: ivSeg.work.paceGuide || false, say: `Ekstra drag, ${durSpoken(ivSeg.work.durationSec)}`, segKind: "extra" });
        extra.push({ label: "Ekstra pause", intensity: ivSeg.rest.intensity, sec: ivSeg.rest.durationSec, say: `Pause, ${durSpoken(ivSeg.rest.durationSec)}`, segKind: "extra" });
      }
    } else if (contSeg) {
      const sec = amount * 60;
      extra.push({ label: "Ekstra tid", intensity: contSeg.intensity, sec, say: `${amount} minutter ekstra ${iLabel(contSeg.intensity).replace("/", "eller")}`, segKind: "extra" });
    }
    setExtendDone(true);
    if (!extra.length) { goCooldown(); return; }
    const newSteps = [...steps.slice(0, at), ...extra, ...steps.slice(at)];
    setSteps(newSteps);
    setExtendPrompt(false);
    setIdx(at); setRem(newSteps[at].sec); setRunning(true);
    acquireWake();
    if (voiceOn) say(extra[0].say || stepSpoken(extra[0]), voiceURI);
  };
  // Fortsett til nedjogg uten å forlenge
  const goCooldown = () => {
    const coolIdx = firstCooldownIdx(steps);
    setExtendDone(true);
    setExtendPrompt(false);
    if (coolIdx === -1) {
      playPling(3, 990);
      if (voiceOn) say("Økt fullført. Godt jobbet!", voiceURI);
      setDone(true); releaseWake(); setDuck(false); return;
    }
    playPling(2, 880);
    setIdx(coolIdx); setRem(steps[coolIdx].sec); setRunning(true);
    acquireWake();
    if (voiceOn) say(steps[coolIdx].say || stepSpoken(steps[coolIdx]), voiceURI);
  };

  if (!steps.length) return html`<p style=${{padding:20}}>Ingen tidsstyrte segmenter i denne økten.</p>`;

  if (done) return html`
    <div style=${{textAlign:"center",padding:"32px 20px"}}>
      <i class="ti ti-circle-check" style=${{fontSize:56,color:"var(--color-accent)",display:"block",marginBottom:16}}></i>

        <${RpePicker} rpe=${rpe} setRpe=${setRpe} feeling=${feeling} setFeeling=${setFeeling}/>
      </div>
      <button onClick=${()=>onFinish({ rpe, feeling })} class="btn-primary" style=${{width:"100%",padding:"14px",fontSize:15,marginBottom:10}}>
        <i class="ti ti-check"></i> Logg og kryss av
      </button>
      <button onClick=${onExit} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Tilbake</button>
    </div>`;

  const step = steps[idx];
  const next = steps[idx+1];
  const m = Math.floor(rem/60), s = rem%60;
  const pct = step.sec ? Math.round(((step.sec-rem)/step.sec)*100) : 0;
  const circ = Math.round(2*Math.PI*70);
  const col = iColor(step.intensity);
  const zone = hrZone(step.intensity, maxHR);
  const pace = step.paceGuide ? (thresholdKmh ? paceFromSec(guidePaceSec(step.sec, thresholdKmh)) : null)
    : step.paceSec ? paceFromSec(step.paceSec)
    : ((step.label.startsWith("Arbeid") || step.label === "Ekstra drag") ? paceZone(step.sec, thresholdKmh) : null);
  const totalSec = steps.reduce((a,x)=>a+x.sec,0);
  let elapsedSec = 0; for (let i=0;i<idx;i++) elapsedSec += steps[i].sec;
  elapsedSec += step.sec - rem;
  const overallPct = totalSec ? Math.round((elapsedSec/totalSec)*100) : 0;

  return html`
    <div>
      <div style=${{display:"flex",gap:2,marginBottom:18}}>
        ${steps.map((_,i)=>html`<div key=${i} style=${{flex:1,height:3,borderRadius:2,background:i<idx?col:i===idx?col:"var(--color-border-tertiary)",opacity:i<=idx?1:0.5,transition:"all 0.3s"}}></div>`)}
      </div>
      <p class="eyebrow" style=${{textAlign:"center",margin:"0 0 8px"}}>Steg ${idx+1} / ${steps.length}</p>
      <div style=${{textAlign:"center"}}>
        <div style=${{display:"inline-block",padding:"5px 16px",borderRadius:20,background:col,color:"#fff",fontSize:14,fontWeight:600,marginBottom:8}}>
          ${iLabel(step.intensity)}
        </div>
        <p style=${{margin:"0 0 12px",fontSize:15,color:"var(--color-text-secondary)"}}>${step.label}</p>
      </div>
      <div style=${{position:"relative",width:170,height:170,margin:"0 auto 20px"}}>
        <svg width="170" height="170" style=${{transform:"rotate(-90deg)"}}>
          <circle cx="85" cy="85" r="70" fill="none" stroke="var(--color-border-tertiary)" stroke-width="7"/>
          <circle cx="85" cy="85" r="70" fill="none" stroke=${col} stroke-width="7"
            stroke-dasharray="${circ} ${circ}" stroke-dashoffset="${Math.round(circ*(1-pct/100))}"
            stroke-linecap="round" style=${{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
          <span class="mono" style=${{fontSize:42,fontWeight:600,letterSpacing:"-0.02em"}}>${m>0?`${m}:${pad(s)}`:s}</span>
          <span class="eyebrow" style=${{fontSize:10,letterSpacing:"0.18em"}}>${m>0?"min : sek":"sek"}</span>
        </div>
      </div>
      ${(zone || pace) && html`
        <div class="metric-grid" style=${{marginBottom:16}}>
          <div class="metric-cell">
            <div class="lab"><i class="ti ti-bolt" style=${{fontSize:12,verticalAlign:"-1px"}}></i> Fart</div>
            <div class="val">${pace ? (unit==="pace" ? `${pace.pace[0]}–${pace.pace[1]}` : `${pace.kmh[0]}–${pace.kmh[1]}`) : "–"}<small> ${unit==="pace"?"/km":"km/t"}</small></div>
          </div>
          <div class="metric-cell">
            <div class="lab"><i class="ti ti-heartbeat" style=${{fontSize:12,verticalAlign:"-1px"}}></i> Puls${otZoneText(step.intensity) ? ` · ${otZoneText(step.intensity).toLowerCase()}` : ""}</div>
            <div class="val">${zone ? `${zone.bpm[0]}–${zone.bpm[1]}` : "–"}<small> slag/min</small></div>
          </div>
        </div>`}
      ${next && html`<p style=${{textAlign:"center",margin:"0 0 16px",fontSize:13,color:"var(--color-text-tertiary)"}}>Neste: ${iLabel(next.intensity)} · ${durText(next.sec)}</p>`}
      <div style=${{display:"flex",gap:10,marginBottom:10}}>
        <button onClick=${toggleRun} class=${running?"":"btn-primary"} style=${{flex:2,padding:"14px",fontSize:16}}>
          <i class=${`ti ${running?"ti-player-pause":"ti-player-play"}`}></i> ${running?"Pause":"Start"}
        </button>
        <button onClick=${advance} style=${{flex:1,padding:"14px",fontSize:14,color:"var(--color-text-secondary)"}}>
          Hopp <i class="ti ti-player-skip-forward"></i>
        </button>
      </div>
      <button onClick=${()=>setLocked(true)} style=${{width:"100%",padding:"12px",fontSize:14,marginBottom:10}}>
        <i class="ti ti-lock"></i> Lås skjerm (lommesikker)
      </button>
      <button onClick=${onExit} style=${{width:"100%",padding:"11px",fontSize:13,color:"var(--color-text-secondary)"}}>
        <i class="ti ti-x"></i> Avslutt guidet økt
      </button>
      ${locked && html`
        <div style=${{position:"fixed",inset:0,zIndex:1000,background:"var(--color-background-secondary)",display:"flex",flexDirection:"column",padding:"22px 20px",boxSizing:"border-box"}}>
          <div style=${{display:"flex",gap:2,marginBottom:10}}>
            ${steps.map((_,i)=>html`<div key=${i} style=${{flex:1,height:6,borderRadius:3,background:i<=idx?col:"var(--color-border-tertiary)",opacity:i<=idx?1:0.5}}></div>`)}
          </div>
          <p style=${{textAlign:"center",margin:0,fontSize:17,fontWeight:500,color:"var(--color-text-secondary)"}}>Steg ${idx+1} / ${steps.length} · ${overallPct}%</p>
          <div style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
            <div style=${{display:"inline-block",padding:"12px 34px",borderRadius:34,background:col,color:"#fff",fontSize:34,fontWeight:700,marginBottom:16}}>${iLabel(step.intensity)}</div>
            ${zone && html`<p style=${{margin:"0 0 10px",fontSize:18,color:"var(--color-text-secondary)"}}><i class="ti ti-heartbeat"></i> ${zone.bpm[0]}-${zone.bpm[1]} slag/min</p>`}
            ${pace && html`<p style=${{margin:"0 0 10px",fontSize:18,color:"var(--color-text-secondary)"}}><i class="ti ti-bolt"></i> ${unit==="pace" ? `${pace.pace[0]}-${pace.pace[1]} /km` : `${pace.kmh[0]}-${pace.kmh[1]} km/t`}</p>`}
            <p style=${{margin:"0 0 16px",fontSize:28,fontWeight:600,color:"var(--color-text-secondary)"}}>${step.label}</p>
            <div style=${{fontSize:72,fontWeight:600,fontVariantNumeric:"tabular-nums",lineHeight:1}}>${m>0?`${m}:${pad(s)}`:s}</div>
          </div>
          <button onPointerDown=${startUnlock} onPointerUp=${cancelUnlock} onPointerLeave=${cancelUnlock} onPointerCancel=${cancelUnlock}
            style=${{padding:"18px",fontSize:16,borderRadius:30,border:"1px solid var(--color-border-secondary)"}}>
            <i class="ti ti-lock-open"></i> ${unlockHint ? "Hold inne…" : "Hold for å låse opp"}

        </div>`}
      ${shield && html`<div style=${{position:"fixed",inset:0,zIndex:1001}} onClick=${e=>{e.stopPropagation();e.preventDefault();}} onPointerDown=${e=>{e.stopPropagation();e.preventDefault();}}></div>`}

  `;
}

// Konfig før guidet økt (velg antall/varighet for ranges)
function GuidedConfig({ session, readiness, voiceOn, setVoiceOn, voiceURI, setVoiceURI, onStart, onCancel }) {
  const initial = {};
  session.segments.forEach((seg,i)=>{
    if (seg.repeatsRange) initial[i] = { reps: seg.repeatsRange[1] };
    else if (seg.durationRangeSec) initial[i] = { sec: seg.durationRangeSec[0] };
  });
  const [choices, setChoices] = useState(initial);
  const hasRanges = Object.keys(initial).length > 0;
  // Grønt lys (kap. 12): tillat å forlenge økten 30-40 % utover planlagt range
  const green = readiness && readiness.color === "gronn" && isHardSession(session);
  const ext = m => green ? Math.ceil(m*1.4) : m;
  const setReps = (i,v,seg)=>setChoices(c=>({...c,[i]:{reps:Math.min(ext(seg.repeatsRange[1]),Math.max(seg.repeatsRange[0],v))}}));
  const setSec  = (i,v,seg)=>setChoices(c=>({...c,[i]:{sec:Math.min(ext(seg.durationRangeSec[1]),Math.max(seg.durationRangeSec[0],v))}}));

  return html`
    <div>
      <h2 style=${{margin:"0 0 4px",fontSize:19,fontWeight:500}}>Guidet økt</h2>
      <p style=${{margin:"0 0 18px",fontSize:14,color:"var(--color-text-secondary)"}}>Timeren teller deg gjennom hvert segment med lydsignal ved bytte. Perfekt på mølla.</p>
      ${isHardSession(session) && readiness && (readiness.color === "gronn" || readiness.color === "rod") && html`<${ReadinessBanner} readiness=${readiness}/>`}
      ${hasRanges && html`
        <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"16px 18px",marginBottom:16}}>
          <p style=${{margin:"0 0 12px",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Velg for denne økten</p>
          ${session.segments.map((seg,i)=>{
            if (seg.repeatsRange) return html`
              <div key=${i} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
                <span style=${{fontSize:14}}>${durText(seg.work.durationSec)} ${iLabel(seg.work.intensity)}-intervaller</span>
                <div style=${{display:"flex",alignItems:"center",gap:12}}>
                  <button onClick=${()=>setReps(i,(choices[i].reps)-1,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>−</button>
                  <span style=${{minWidth:24,textAlign:"center",fontSize:16,fontWeight:500}}>${choices[i].reps}</span>
                  <button onClick=${()=>setReps(i,(choices[i].reps)+1,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>+</button>
                </div>
              </div>`;
            if (seg.durationRangeSec) return html`
              <div key=${i} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0"}}>
                <span style=${{fontSize:14}}>${iLabel(seg.intensity)}</span>
                <div style=${{display:"flex",alignItems:"center",gap:12}}>
                  <button onClick=${()=>setSec(i,(choices[i].sec)-60,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>−</button>
                  <span style=${{minWidth:52,textAlign:"center",fontSize:15,fontWeight:500}}>${durText(choices[i].sec)}</span>
                  <button onClick=${()=>setSec(i,(choices[i].sec)+60,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>+</button>
                </div>
              </div>`;
            return null;
          })}
        </div>`}
      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"16px 18px",marginBottom:16}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style=${{margin:0,fontSize:15,fontWeight:500}}><i class="ti ti-volume"></i> Stemme</p>
            <p style=${{margin:"2px 0 0",fontSize:12,color:"var(--color-text-secondary)"}}>Sier øktene høyt, demper musikk</p>
          </div>
          <button onClick=${()=>setVoiceOn(!voiceOn)} style=${{width:52,height:30,borderRadius:15,padding:0,position:"relative",background:voiceOn?"var(--color-accent)":"var(--color-border-secondary)",border:"none"}}>
            <span style=${{position:"absolute",top:3,left:voiceOn?25:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left 0.15s"}}></span>
          </button>
        </div>
        ${voiceOn && html`
          <div style=${{marginTop:14}}>
            ${(() => { const vs = norskVoices(); return vs.length
              ? html`
                <select value=${voiceURI} onChange=${e=>setVoiceURI(e.target.value)}
                  style=${{width:"100%",padding:"10px 12px",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",fontSize:14}}>
                  <option value="">Standard (${vs[0].lang})</option>
                  ${vs.map(v=>html`<option key=${v.voiceURI} value=${v.voiceURI}>${v.name} (${v.lang})</option>`)}
                </select>
                <button onClick=${()=>say("2 minutter terskel. 60 sekunder gange, om 3, 2, 1.", voiceURI)} style=${{width:"100%",marginTop:10,padding:"10px",fontSize:14}}>
                  <i class="ti ti-player-play"></i> Test stemmen
                </button>`
              : html`<p style=${{margin:0,fontSize:13,color:"var(--color-text-secondary)"}}>Fant ingen stemmer på enheten. På iPhone: last ned norske stemmer under Innstillinger → Tilgjengelighet → Talt innhold → Stemmer → Norsk.</p>`;
            })()}
          </div>`}
      </div>
      <button onClick=${()=>onStart(choices)} class="btn-primary" style=${{width:"100%",padding:"15px",fontSize:16,marginBottom:10}}>
        <i class="ti ti-player-play"></i> Start
      </button>
      <button onClick=${onCancel} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Avbryt</button>
    </div>
  `;
}

function ManualCheck({ profile, onClose, onSaved }) {
  const [hvilepuls, setHvilepuls] = useState("ok");
  const [trapp, setTrapp] = useState("ok");
  const [bein, setBein] = useState("ok");
  const [baseline, setBaseline] = useState(profile.resting_hr_baseline ?? null);
  const [busy, setBusy] = useState(false);
  const OPTS = ["god","ok","avvik"];
  const rows = [
    [`Hvilepuls i morges${baseline ? ` (din normal: ~${baseline})` : ""}`, hvilepuls, setHvilepuls, ["Lav","Normal","Høy"]],
    ["Trappetest – lårfølelse opp en trapp", trapp, setTrapp, ["Lett","OK","Tungt"]],
    ["Beinfølelse", bein, setBein, ["Lette","Normale","Tunge"]],
  ];
  const save = async () => {
    setBusy(true);
    const row = { day: todayKey(), source: "manual", color: manualColor({ hvilepuls, trapp, bein }) };
    await saveReadiness(row);
    if (baseline !== (profile.resting_hr_baseline ?? null)) { try { await saveProfile({ resting_hr_baseline: baseline }); } catch {} }
    setBusy(false);
    onSaved(row);
  };
  return html`
    <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${onClose}>
      <div onClick=${e=>e.stopPropagation()} class="card" style=${{padding:"22px",maxWidth:380,width:"100%",maxHeight:"85vh",overflowY:"auto",overscrollBehavior:"contain"}}>
        <p class="eyebrow" style=${{margin:"0 0 5px"}}>Dagsform</p>
        <p style=${{margin:"0 0 4px",fontSize:19,fontWeight:600,letterSpacing:"-0.01em"}}>30-sekunders sjekk</p>
        <p style=${{margin:"0 0 16px",fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.5}}>Bokas raske trafikklys-sjekk før nøkkeløkt (brukes når Whoop-data mangler). Alle gode = grønt, ett klart avvik = rødt.</p>
        ${rows.map(([label, val, setVal, names], i)=>html`
          <div key=${i} style=${{marginBottom:12}}>
            <label style=${{display:"block",fontSize:13,marginBottom:6}}>${label}</label>
            <div style=${{display:"flex",gap:6}}>
              ${OPTS.map((o,j)=>html`
                <button key=${o} onClick=${()=>setVal(o)} style=${{flex:1,padding:"9px 0",fontSize:13,fontWeight:val===o?600:400,
                  background:val===o?"var(--color-accent)":"var(--color-background-secondary)",color:val===o?"#fff":"var(--color-text-primary)",
                  border:val===o?"none":"0.5px solid var(--color-border-tertiary)"}}>${names[j]}</button>`)}
            </div>
          </div>`)}
        <div style=${{marginBottom:16}}>
          <label style=${{display:"block",fontSize:12,color:"var(--color-text-secondary)",marginBottom:5}}>Normal hvilepuls (valgfritt, for referanse)</label>
          <input class="mono" type="number" inputmode="numeric" value=${baseline ?? ""} placeholder="slag/min"
            onInput=${e=>setBaseline(e.target.value ? parseInt(e.target.value,10) : null)} style=${{width:"100%",boxSizing:"border-box"}}/>
        </div>
        <button onClick=${save} disabled=${busy} class="btn-primary" style=${{width:"100%",padding:"13px",fontSize:15,marginBottom:8}}>${busy?"Lagrer…":"Lagre dagsform"}</button>
        <button onClick=${onClose} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Avbryt</button>
      </div>
    </div>`;
}

// ─── A2: streaks + milepæler + 10-dagers-varsel ───────────────────────────────
function MotivationCard({ log, activeProgram }) {
  const streak = computeStreak(log);
  const total = Object.values(log).filter(r=>r&&r.done).length;
  if (!total) return null;
  const next = MILESTONES.find(m=>m>total);
  let halfway = false;
  if (activeProgram) {
    const ss = programSessions(activeProgram);
    const d = ss.filter(s=>log[s.id]&&log[s.id].done).length;
    halfway = ss.length > 0 && d/ss.length >= 0.5 && d < ss.length;
  }
  const warn = tenDayWarning(log);
  return html`
    <div class="card" style=${{marginBottom:14,padding:"14px 18px"}}>
      <div style=${{display:"flex",gap:16,flexWrap:"wrap",fontSize:13}}>
        ${streak >= 2 && html`<span>🔥 <b class="mono">${streak} uker</b> på rad med trening</span>`}
        <span>🏅 <b class="mono">${total}</b> økter totalt${next ? ` · neste milepæl: ${next}` : ""}</span>
        ${halfway && html`<span>🎉 Halvveis i programmet!</span>`}
      </div>
      ${warn && html`
        <p style=${{margin:"10px 0 0",fontSize:13,lineHeight:1.5,color:"#ff3b30"}}>
          ⚠️ <b>Sett på bremsene:</b> ingen økt har føltes skikkelig god på 10 dager. Ta en lettere uke – reduser intensitet, behold rolig løping (45/15 og 30/30 stimulerer muskulaturen tilbake).
        </p>`}
    </div>`;
}

// ─── A3: ukekalender for generert program (planlagte datoer) ──────────────────
function WeekCalendar({ program, log, onOpen }) {
  const [offset, setOffset] = useState(0);
  const monday = addDays(parseKey(weekMondayKey(todayKey())), offset*7);
  const sess = programSessions(program);
  const today = todayKey();
  const fmtD = d => `${d.getDate()}.${d.getMonth()+1}`;
  return html`
    <div class="card" style=${{marginBottom:14,padding:"14px 16px"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick=${()=>setOffset(o=>o-1)} style=${{padding:"4px 10px",fontSize:14}}><i class="ti ti-chevron-left"></i></button>
        <span class="mono" style=${{fontSize:13,fontWeight:500}}>${fmtD(monday)} – ${fmtD(addDays(monday,6))}${offset===0?" (denne uken)":""}</span>
        <button onClick=${()=>setOffset(o=>o+1)} style=${{padding:"4px 10px",fontSize:14}}><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style=${{display:"flex",gap:4}}>
        ${[0,1,2,3,4,5,6].map(i=>{
          const d = addDays(monday,i), k = dateKey(d);
          const list = sess.filter(s=>s.plannedDate===k);
          const isToday = k===today;
          return html`
            <button key=${i} onClick=${()=>{ if(list.length) onOpen(list[0]); }} style=${{
              flex:1,minWidth:0,padding:"7px 0 6px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              background:"var(--color-background-secondary)",
              border:isToday?"1.5px solid var(--color-accent)":"0.5px solid var(--color-border-tertiary)",
              cursor:list.length?"pointer":"default",opacity:list.length||isToday?1:0.6}}>
              <span style=${{fontSize:10,letterSpacing:"0.06em",color:"var(--color-text-tertiary)"}}>${["M","T","O","T","F","L","S"][i]}</span>
              <span class="mono" style=${{fontSize:12,fontWeight:isToday?700:400,color:isToday?"var(--color-accent-dark)":"inherit"}}>${d.getDate()}</span>
              <span style=${{display:"flex",gap:2,minHeight:8}}>
                ${list.map(s=>{
                  const done = log[s.id]&&log[s.id].done;
                  const col = done ? "var(--color-accent)" : s.type==="strength" ? iColor("styrke") : iColor((sessionPaces(s).work)||"rolig_lop");
                  return html`<span key=${s.id} style=${{width:7,height:7,borderRadius:"50%",background:col,opacity:done?1:0.85}}></span>`;
                })}
              </span>
            </button>`;
        })}
      </div>
      <p style=${{margin:"8px 0 0",fontSize:11,color:"var(--color-text-tertiary)"}}>Ryker en økt: ikke ta den igjen – hold neste planlagte. Styr fremover, aldri bakover.</p>
    </div>`;
}

// ─── PROGRAMBYGGER: wizard ────────────────────────────────────────────────────
function BuilderWizard({ unit, thresholdKmh, profile, onClose, onCreated }) {
  const [step, setStep] = useState(0);
  const [goal, setGoal] = useState(null);
  const [goalDate, setGoalDate] = useState("");
  const [weeksCount, setWeeksCount] = useState(8);
  const [runs, setRuns] = useState(4);
  const [birthYear, setBirthYear] = useState(profile.birth_year ?? null);
  const [injury, setInjury] = useState(profile.injury_history ?? "ingen");
  const [strength, setStrength] = useState(null);   // null = følg anbefalingen
  const [placement, setPlacement] = useState("C");
  const [thr, setThr] = useState(thresholdKmh ?? null);
  const [period, setPeriod] = useState(null);
  const [dblT, setDblT] = useState(null);          // dobbel terskel (kap. 8): null = følg anbefalingen
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const meta = goal ? GOAL_META[goal] : null;
  const recS = recommendStrength(birthYear, injury);
  const sVal = strength ?? recS;
  // Månedssyklus (kap. 8) er kun anbefalt/tilgjengelig fra 7 økter/uke (ambisiøs-nivået) –
  // under det gjelder samme anbefaling som før.
  const recP = runs >= 7 ? "manedssyklus" : (injury === "mange" ? "flat" : (meta && meta.race ? "progressiv_x" : "flat"));
  const pVal = period ?? recP;
  // Dobbel terskel-valg (kap. 8): kun relevant fra 7 økter/uke. 7 → «annenhver uke» som default,
  // 8 → «full dobbel» som default. Ugyldig valg (f.eks. "full" beholdt etter å ha gått fra 8 til 7
  // økter/uke) faller tilbake til anbefalingen i stedet for å lagre en kombinasjon som ikke finnes.
  const recDbl = runs === 7 ? "annenhver" : runs === 8 ? "full" : "ingen";
  const dblOptions = runs === 7 ? ["ingen","annenhver"] : runs === 8 ? ["ingen","full"] : ["ingen"];
  const dblVal = dblOptions.includes(dblT) ? dblT : recDbl;
  const weeksTo = meta && meta.race && goalDate ? Math.round((parseKey(goalDate).getTime() - nextMonday().getTime())/(7*86400000)) : null;
  const canNext = step===0 ? !!goal
    : step===1 ? (meta.race ? (goalDate && weeksTo >= 4) : weeksCount >= 4)
    : true;
  const opts = () => ({ goal, goalDate: meta.race ? goalDate : null, weeksCount, runsPerWeek: runs, strengthPerWeek: sVal, periodization: pVal, thresholdKmh: thr, strengthPlacement: placement, doubleThreshold: runs >= 7 ? dblVal : "ingen" });
  const create = async () => {
    setBusy(true); setErr("");
    const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const gen = generateProgram(opts(), id.slice(0,8));
    gen.name = name.trim() || (meta ? meta.label : "Eget program"); // navnet lagres i program_json (ingen egen kolonne)
    try { await saveProfile({ birth_year: birthYear, injury_history: injury }); } catch {}
    const error = await insertProgram({ id, goal, goal_date: meta.race ? goalDate : null, runs_per_week: runs, strength_per_week: sVal, periodization: pVal, level_kmh: thr, program_json: gen, active: true });
    setBusy(false);
    if (error) { setErr(`Kunne ikke lagre programmet (${error.message || "ukjent feil"}). Er v2-schema.sql kjørt i Supabase?`); return; }
    onCreated(id);
  };
  const chip = (sel) => ({ padding:"12px 14px", fontSize:14, textAlign:"left", width:"100%", marginBottom:8,
    background: sel ? "var(--color-accent)" : "var(--color-background-secondary)", color: sel ? "#fff" : "var(--color-text-primary)",
    border: sel ? "none" : "0.5px solid var(--color-border-tertiary)" });
  const stepper = (val, setVal, min, max) => html`
    <div style=${{display:"flex",alignItems:"center",gap:14,justifyContent:"center",margin:"10px 0"}}>
      <button onClick=${()=>setVal(Math.max(min,val-1))} style=${{width:40,height:40,padding:0,fontSize:20}}>−</button>
      <span class="mono" style=${{minWidth:40,textAlign:"center",fontSize:26,fontWeight:600}}>${val}</span>
      <button onClick=${()=>setVal(Math.min(max,val+1))} style=${{width:40,height:40,padding:0,fontSize:20}}>+</button>
    </div>`;
  const stepTitles = ["Hva er målet?","Når?","Løpeøkter per uke","Styrke","Nivå","Periodisering","Oppsummering"];
  let bodyEl;
  if (step === 0) bodyEl = html`<div>
    ${Object.entries(GOAL_META).map(([k,m])=>html`
      <button key=${k} onClick=${()=>setGoal(k)} style=${chip(goal===k)}>${m.label}</button>`)}
  </div>`;
  else if (step === 1) bodyEl = meta.race
    ? html`<div>

        ${goalDate && html`<p style=${{margin:0,fontSize:13,color:weeksTo>=4?"var(--color-text-secondary)":"#ff3b30"}}>
          ${weeksTo>=4 ? `Gir et program på ${weeksTo} uker (starter førstkommende mandag).` : "For kort tid – programmet trenger minst 4 uker."}</p>`}
      </div>`
    : html`<div>
        <p style=${{margin:"0 0 4px",fontSize:13,color:"var(--color-text-secondary)"}}>Hvor mange uker skal programmet vare?</p>
        ${stepper(weeksCount, setWeeksCount, 4, 24)}

  else if (step === 2) bodyEl = html`<div>

        : runs===6 ? "Hovedøkt + støtteøkt + X-økt + 2 rolige + langtur."
        : runs===7 ? "Kap. 8 – «Mellommodell»: hovedøkt + støtteøkt + X-økt + rolige + langtur, med valgfri dobbel terskel (se under)."

      Tre nøkkeløkter er grunnmuren – resten er rolig påfyll (justert 80/20: 60-65 % rolig, 20-30 % terskel, 5-10 % høy intensitet).
    </p>
    ${runs >= 7 && html`<div>

      <div style=${{display:"flex",gap:6,marginBottom:8}}>
        ${(runs===7 ? [["ingen","Ingen"],["annenhver","Annenhver uke"]] : [["ingen","Ingen"],["full","Full dobbel"]]).map(([v,l])=>html`
          <button key=${v} onClick=${()=>setDblT(v)} style=${{flex:1,padding:"9px 0",fontSize:13,

      <p style=${{margin:"0 0 12px",fontSize:12,color:"var(--color-text-tertiary)"}}>Typisk navnet på løpet eller målet. Står tomt? Da brukes «${meta ? meta.label : "Eget program"}».</p>
