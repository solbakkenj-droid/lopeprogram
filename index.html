function SessionView({ session, week, log, unit, voiceOn, setVoiceOn, voiceURI, setVoiceURI, stravaConnected, maxHR, thresholdKmh, readiness, onBack, onSave, onDelete }) {
  const rec = log[session.id] || {};
  const [mode, setMode] = useState("detail"); // detail | config | guided
  const [choices, setChoices] = useState(null);
  const [doneDate, setDoneDate] = useState(rec.done_date || todayKey());
  const [easy, setEasy] = useState(rec.easy_kmh ?? null);
  const [thr, setThr] = useState(rec.threshold_kmh ?? null);
  const [note, setNote] = useState(rec.note || "");
  const done = !!rec.done;
  const [sBusy, setSBusy] = useState(false);
  const [sMsg, setSMsg] = useState("");
  const [picks, setPicks] = useState(null);
  const [justSaved, setJustSaved] = useState(false);
  const [easyHr, setEasyHr] = useState(rec.easy_hr ?? null);
  const [workHr, setWorkHr] = useState(rec.work_hr ?? null);
  const [dist, setDist] = useState(rec.distance_m ?? null);
  const [movTime, setMovTime] = useState(rec.moving_time_s ?? null);
  const [rpe, setRpe] = useState(rec.rpe ?? null);
  const [feeling, setFeeling] = useState(rec.feeling ?? null);
  const [copied, setCopied] = useState(false);
  const isStrength = session.type === "strength";
  const useActivity = async (a) => {
    setSBusy(true); setPicks(null); setSMsg("");
    const s = await stravaCall({ action:"streams", id: a.id });
    setSBusy(false);
    if (!s || s.error || !s.velocity) { setSMsg("Kunne ikke hente data."); return; }
    const p = splitStrava(s.velocity, s.heartrate);
    if (!p) { setSMsg("For lite fartsdata til å splitte."); return; }
    setEasy(p.easy_kmh); setThr(p.work_kmh);
    setEasyHr(p.easy_hr); setWorkHr(p.work_hr);
    setDist(a.distance || null); setMovTime(a.moving_time || null);
    if (s.description) {
      setNote(prev => {
        const manual = (prev||"").split("\n").filter(l => !l.trim().startsWith("Strava:")).join("\n").trim();
        return manual ? `${manual}\nStrava: ${s.description}` : `Strava: ${s.description}`;
      });
    }
    setSMsg(`Hentet fra «${a.name}». Sjekk og juster ved behov.`);
  };
  const hentStrava = async () => {
    setSBusy(true); setSMsg(""); setPicks(null);
    const r = await stravaCall({ action:"activities", date: doneDate });
    if (!r || r.error || !r.activities) { setSBusy(false); setSMsg("Kunne ikke hente fra Strava."); return; }
    if (r.activities.length === 0) { setSBusy(false); setSMsg("Fant ingen Strava-økt på " + doneDate + "."); return; }
    if (r.activities.length === 1) { await useActivity(r.activities[0]); return; }
    setSBusy(false); setPicks(r.activities);
  };
  const noteRef = useRef(null);
  useEffect(() => { const el = noteRef.current; if (el) { el.style.height = "auto"; el.style.height = el.scrollHeight + "px"; } }, [note, mode]);

  const save = (markDone, extra) => {
    const ex = extra || {};
    const row = {
      session_id: session.id,
      week: session.week,
      done: markDone,
      done_date: markDone ? doneDate : null,
      easy_kmh: easy, threshold_kmh: thr, note: note || null,
      easy_hr: easyHr, work_hr: workHr, distance_m: dist, moving_time_s: movTime,
    };
    // Nye v2-kolonner sendes kun når de har verdi, så logging virker før v2-schema.sql er kjørt
    const rpeVal = ex.rpe !== undefined ? ex.rpe : rpe;
    const feelVal = ex.feeling !== undefined ? ex.feeling : feeling;
    if (rpeVal != null) row.rpe = rpeVal;
    if (feelVal != null) row.feeling = feelVal;
    if (session.plannedDate) row.planned_date = session.plannedDate;
    if (session.programId) row.program_id = session.programId;
    onSave(row);
    setJustSaved(true);
    setTimeout(() => setJustSaved(false), 2000);
  };

  if (mode === "config") return html`<div style=${{padding:"4px 2px"}}><${GuidedConfig} session=${session} readiness=${readiness}
    voiceOn=${voiceOn} setVoiceOn=${setVoiceOn} voiceURI=${voiceURI} setVoiceURI=${setVoiceURI}
    onStart=${(c)=>{setChoices(c);setMode("guided");}} onCancel=${()=>setMode("detail")}/></div>`;

  if (mode === "guided") return html`<${GuidedSession} session=${session} choices=${choices} readiness=${readiness}
    voiceOn=${voiceOn} voiceURI=${voiceURI} maxHR=${maxHR} thresholdKmh=${thresholdKmh} unit=${unit}
    onExit=${()=>setMode("detail")} onFinish=${(extra)=>{
      if (extra) { if (extra.rpe !== undefined) setRpe(extra.rpe); if (extra.feeling !== undefined) setFeeling(extra.feeling); }
      save(true, extra); setMode("detail");
    }}/>`;

  return html`
    <div>
      <button onClick=${onBack} style=${{background:"none",border:"none",color:"var(--color-text-secondary)",fontSize:14,padding:"0 0 14px",cursor:"pointer"}}>
        <i class="ti ti-arrow-left"></i> Uke ${session.week}
      </button>

      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <h1 style=${{margin:0,fontSize:22,fontWeight:600}}>${displayDay(session, rec)}</h1>
        ${done && html`<span style=${{fontSize:13,color:"var(--color-text-success)",fontWeight:500}}><i class="ti ti-circle-check"></i> Gjort ${rec.done_date||""}</span>`}
      </div>
      ${session.optional && html`<span style=${{display:"inline-block",fontSize:12,background:"var(--color-background-info)",color:"var(--color-text-info)",padding:"2px 10px",borderRadius:6,marginBottom:8}}>Valgfri</span>`}
      <p class="mono" style=${{margin:"0 0 16px",fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.5}}>${segmentSummary(session)} · ca. ${sessionMinutes(session)} min</p>

      ${!done && isHardSession(session) && html`<${ReadinessBanner} readiness=${readiness}/>`}

      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"18px",marginBottom:14}}>
        <${SegmentList} session=${session} maxHR=${maxHR} thresholdKmh=${thresholdKmh} unit=${unit}/>
      </div>

      <button onClick=${()=>setMode("config")} class="btn-primary" style=${{width:"100%",padding:"15px",fontSize:15,marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <i class="ti ti-player-play"></i> Start guidet økt
      </button>

      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"18px",marginBottom:14}}>
        <p class="eyebrow" style=${{margin:"0 0 14px"}}>Logg økten</p>
        ${!isStrength && stravaConnected && html`
          <div style=${{marginBottom:14}}>
            <button onClick=${hentStrava} disabled=${sBusy} style=${{width:"100%",padding:"11px",fontSize:14,background:"#FC4C02",color:"#fff",border:"none"}}>
              <i class="ti ti-brand-strava"></i> ${sBusy ? "Henter…" : "Hent fra Strava"}
            </button>
            ${sMsg && html`<p style=${{margin:"8px 0 0",fontSize:12,color:"var(--color-text-secondary)"}}>${sMsg}</p>`}
            ${picks && html`<div style=${{marginTop:8}}>
              <p style=${{margin:"0 0 6px",fontSize:12,color:"var(--color-text-secondary)"}}>Flere økter denne dagen – velg:</p>
              ${picks.map(a=>html`<button key=${a.id} onClick=${()=>useActivity(a)} style=${{display:"block",width:"100%",textAlign:"left",padding:"9px 12px",fontSize:13,marginBottom:6}}>${a.name} · ${(a.distance/1000).toFixed(2)} km</button>`)}
            </div>`}
          </div>`}
        ${!isStrength && (() => {
          const p = sessionPaces(session);
          const easyLabel = p.easy ? cap(iLabel(p.easy)) : "Fart";
          return p.work
            ? html`<div style=${{display:"flex",gap:12,marginBottom:14}}>
                <${SpeedInput} label=${easyLabel} kmh=${easy} unit=${unit} onChange=${setEasy}/>
                <${SpeedInput} label=${cap(iLabel(p.work))} kmh=${thr} unit=${unit} onChange=${setThr}/>
              </div>`
            : html`<div style=${{marginBottom:14}}>
                <${SpeedInput} label=${easyLabel} kmh=${easy} unit=${unit} onChange=${setEasy}/>
              </div>`;
        })()}
        ${(dist || workHr || easyHr) && html`
          <div style=${{display:"flex",flexWrap:"wrap",gap:"6px 16px",marginBottom:14,fontSize:13,color:"var(--color-text-secondary)"}}>
            ${dist ? html`<span><i class="ti ti-ruler-2" style=${{fontSize:14,verticalAlign:"-2px"}}></i> ${(dist/1000).toFixed(2)} km${movTime?` · ${Math.round(movTime/60)} min`:""}</span>` : ""}
            ${(workHr||easyHr) ? html`<span><i class="ti ti-heartbeat" style=${{fontSize:14,verticalAlign:"-2px",color:"#ff3b30"}}></i> Puls ${workHr?`løp ${workHr}`:""}${workHr&&easyHr?" · ":""}${easyHr?`gange ${easyHr}`:""}</span>` : ""}
          </div>`}
        <${RpePicker} rpe=${rpe} setRpe=${setRpe} feeling=${feeling} setFeeling=${setFeeling}/>
        <label style=${{display:"block",fontSize:12,color:"var(--color-text-secondary)",marginBottom:5}}>Dato</label>
        <input type="date" value=${doneDate} onChange=${e=>setDoneDate(e.target.value)} style=${{width:"100%",marginBottom:14,boxSizing:"border-box"}}/>
        <textarea ref=${noteRef} value=${note} onInput=${e=>setNote(e.target.value)} placeholder="Notat (hvordan føltes det?)" rows="2"
          style=${{width:"100%",resize:"none",overflow:"hidden",minHeight:"56px",fontSize:14,border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"9px 12px",background:"var(--color-background-secondary)",boxSizing:"border-box",lineHeight:1.5}}></textarea>
        <div style=${{display:"flex",gap:10,marginTop:14}}>
          ${!done
            ? html`<button onClick=${()=>save(true)} class="btn-primary" style=${{flex:1,padding:"13px",fontSize:15}}>${justSaved ? html`<i class="ti ti-check"></i> Lagret!` : html`<i class="ti ti-check"></i> Kryss av som gjort`}</button>`
            : html`
              <button onClick=${()=>save(true)} class="btn-primary" style=${{flex:1,padding:"13px",fontSize:15}}>${justSaved ? html`<i class="ti ti-check"></i> Lagret!` : html`<i class="ti ti-device-floppy"></i> Lagre endringer`}</button>
              <button onClick=${()=>onDelete(session.id)} style=${{padding:"13px 16px",fontSize:14,color:"var(--color-text-secondary)"}}><i class="ti ti-arrow-back-up"></i> Angre økt</button>
            `}
        </div>
      </div>

      ${(() => {
        const paste = stravaPasteText(session, { threshold_kmh: thr, easy_kmh: easy }, thresholdKmh);
        if (!paste) return null;
        return html`
          <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px dashed var(--color-border-secondary)",padding:"16px 18px",marginBottom:14}}>
            <p class="eyebrow" style=${{margin:"0 0 8px"}}>Strava-beskrivelse</p>
            <p class="mono" style=${{margin:"0 0 10px",fontSize:13,lineHeight:1.6,color:"var(--color-text-secondary)",userSelect:"text",WebkitUserSelect:"text"}}>${paste}</p>
            <button onClick=${async()=>{ try { await navigator.clipboard.writeText(paste); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch {} }} style=${{width:"100%",padding:"10px",fontSize:13}}>
              <i class=${copied ? "ti ti-check" : "ti ti-copy"}></i> ${copied ? "Kopiert!" : "Kopier til Strava"}
            </button>
            ${!thr && !easy && html`<p style=${{margin:"8px 0 0",fontSize:11,color:"var(--color-text-tertiary)"}}>Farten merket «(mål)» byttes til faktisk fart når du henter økten fra Strava eller fyller inn fart.</p>`}
          </div>`;
      })()}

      ${week.coachNote && html`
        <div style=${{background:"var(--color-background-info)",borderRadius:"var(--border-radius-lg)",padding:"16px 18px",marginBottom:14}}>
          <p style=${{margin:"0 0 6px",fontSize:12,fontWeight:600,color:"var(--color-text-info)"}}><i class="ti ti-bulb"></i> Fra boka</p>
          <p style=${{margin:0,fontSize:14,lineHeight:1.6,color:"var(--color-text-primary)"}}>${week.coachNote}</p>
        </div>`}
    </div>
  `;
}

function WeekView({ week, log, onBack, onOpen, thresholdKmh, maxHR }) {
  const doneCount = week.sessions.filter(s => log[s.id] && log[s.id].done).length;
  const est = weekEstimate(week.sessions, log, thresholdKmh);
  const hh = Math.floor(est.minutes / 60), mm = est.minutes % 60;
  const bandMax = Math.max(...est.bands.map(b => b.sec), 1);
  return html`
    <div>
      <button onClick=${onBack} style=${{background:"none",border:"none",color:"var(--color-text-secondary)",fontSize:14,padding:"0 0 14px",cursor:"pointer"}}>
        <i class="ti ti-arrow-left"></i> Alle uker
      </button>
      <p style=${{margin:"0 0 2px",fontSize:12,color:"var(--color-text-info)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.08em"}}>${week.phase} · Uke ${week.week}</p>
      <h1 style=${{margin:"0 0 8px",fontSize:22,fontWeight:600,lineHeight:1.3}}>${week.title}</h1>
      ${week.info && html`<p style=${{margin:"0 0 8px",fontSize:14,lineHeight:1.6,color:"var(--color-text-secondary)"}}>${week.info}</p>`}
      <p style=${{margin:"0 0 18px",fontSize:13,color:"var(--color-text-tertiary)"}}>${doneCount} / ${week.sessions.length} økter gjort</p>

      <div class="metric-grid" style=${{marginBottom:14}}>
        <div class="metric-cell">
          <div class="lab">Planlagt tid</div>
          <div class="val">${hh ? `${hh}t ${pad(mm)}` : `${mm} min`}</div>
        </div>
        <div class="metric-cell">
          <div class="lab">Estimert distanse</div>
          <div class="val">${est.km != null ? `${est.km} km` : "–"}</div>
        </div>
      </div>
      ${est.bands.length > 0 && html`
        <div class="card" style=${{padding:"16px 18px",marginBottom:18}}>
          <p class="eyebrow" style=${{margin:"0 0 2px"}}>Tid i pulssoner</p>
          <p style=${{margin:"0 0 12px",fontSize:12,color:"var(--color-text-tertiary)"}}>Olympiatoppens soner – samme inndeling som på klokka</p>
          ${est.bands.map(b => html`
            <div key=${b.n} style=${{marginBottom:10}}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,marginBottom:4}}>
                <span style=${{fontSize:13}}>Sone ${b.n} · ${b.label}<span style=${{fontSize:12,color:"var(--color-text-tertiary)"}}> · ${maxHR ? `${Math.round(b.pct[0]/100*maxHR)}–${Math.round(b.pct[1]/100*maxHR)}` : `${b.pct[0]}–${b.pct[1]} %`}</span></span>
                <span class="mono" style=${{fontSize:13,color:"var(--color-text-secondary)",flexShrink:0}}>${Math.round(b.sec/60)} min</span>
              </div>
              <div style=${{height:6,borderRadius:3,background:"var(--color-background-secondary)",overflow:"hidden"}}>
                <div style=${{height:"100%",width:`${Math.round((b.sec/bandMax)*100)}%`,background:"var(--color-accent)",borderRadius:3}}></div>
              </div>
            </div>`)}
          ${est.restSec > 0 && html`
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,paddingTop:2}}>
              <span style=${{fontSize:13,color:"var(--color-text-secondary)"}}>Pause / hvile</span>
              <span class="mono" style=${{fontSize:13,color:"var(--color-text-secondary)"}}>${Math.round(est.restSec/60)} min</span>
            </div>`}
          <p style=${{margin:"10px 0 0",fontSize:12,color:"var(--color-text-tertiary)",lineHeight:1.5}}>
            ${est.km != null
              ? `Distansen er et estimat fra dine egne loggede farter (${est.speeds.n} økt${est.speeds.n===1?"":"er"}), ikke et mål.`
              : "Logg fart på noen økter (eller hent fra Strava), så estimeres distansen her."}
          </p>
        </div>`}

      <div style=${{display:"flex",flexDirection:"column",gap:10}}>
        ${week.sessions.map(s => {
          const r = log[s.id] || {};
          const isDone = !!r.done;
          return html`
            <button key=${s.id} onClick=${()=>onOpen({...s, week: week.week})} style=${{
              textAlign:"left",background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",
              borderRadius:"var(--border-radius-lg)",padding:"16px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"
            }}>
              <span style=${{width:26,height:26,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                border:isDone?"none":"1.5px solid var(--color-border-secondary)",background:isDone?"var(--color-background-success)":"transparent"}}>
                ${isDone && html`<i class="ti ti-check" style=${{fontSize:14,color:"var(--color-text-success)"}}></i>`}
              </span>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{display:"flex",alignItems:"center",gap:8}}>
                  <p style=${{margin:0,fontSize:15,fontWeight:500}}>${displayDay(s, log[s.id])}</p>
                  ${s.optional && html`<span style=${{fontSize:11,color:"var(--color-text-info)"}}>valgfri</span>`}
                </div>
                <p style=${{margin:"3px 0 0",fontSize:13,color:"var(--color-text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${segmentSummary(s)}</p>
              </div>
              <i class="ti ti-chevron-right" style=${{fontSize:18,color:"var(--color-text-tertiary)",flexShrink:0}}></i>
            </button>`;
        })}
      </div>
    </div>
  `;
}

function ProgramView({ log, onOpenWeek, onOpenSession, stravaConnected, onConnectStrava, onDisconnectStrava,
                       programs, progTab, setProgTab, onOpenBuilder, onDeleteProgram,
                       readiness, whoopConnected, whoopReauth, onManualCheck, onConnectWhoop, onDisconnectWhoop,
                       notifyOn, onToggleNotify }) {
  const custom = progTab !== "builtin" ? programs.find(p => p.id === progTab) : null;
  const weeks = custom ? ((custom.program_json && custom.program_json.weeks) || []) : PROGRAM.weeks;
  const sessions = custom ? programSessions(custom) : allSessions();
  const activeProgram = programs.find(p => p.active) || null;
  // Neste økt = første ikke-gjorte, ikke-valgfrie økt
  const next = sessions.find(s => !s.optional && !(log[s.id] && log[s.id].done));
  const totalDone = sessions.filter(s => log[s.id] && log[s.id].done).length;
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [expandedGroups, setExpandedGroups] = useState({});

  // Slå sammen sammenhengende fullførte uker (2+) til én rad, så uken du skal inn
  // på ikke drukner nederst i en lang liste av ferdige uker. Klikk for å åpne dem.
  const weekRows = [];
  for (let i = 0; i < weeks.length; ) {
    const isComplete = w => w.sessions.length > 0 && w.sessions.filter(s => log[s.id] && log[s.id].done).length === w.sessions.length;
    if (isComplete(weeks[i])) {
      let j = i;
      while (j < weeks.length && isComplete(weeks[j])) j++;
      if (j - i >= 2) {
        weekRows.push({ type: "group", start: weeks[i].week, end: weeks[j - 1].week, weeks: weeks.slice(i, j) });
        i = j;
        continue;
      }
    }
    weekRows.push({ type: "week", w: weeks[i] });
    i++;
  }
  const renderWeekButton = w => {
    const dc = w.sessions.filter(s => log[s.id] && log[s.id].done).length;
    const complete = dc === w.sessions.length;
    return html`
      <button key=${w.week} onClick=${()=>onOpenWeek(w.week)} style=${{
        textAlign:"left",background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",
        borderRadius:"var(--border-radius-lg)",padding:"15px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
        <div style=${{width:38,height:38,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
          background:complete?"var(--color-background-success)":"var(--color-background-secondary)",
          color:complete?"var(--color-text-success)":"var(--color-text-secondary)",fontSize:15,fontWeight:600}}>
          ${complete ? html`<i class="ti ti-check" style=${{fontSize:18}}></i>` : w.week}
        </div>
        <div style=${{flex:1,minWidth:0}}>
          <p class="eyebrow" style=${{margin:0}}>${w.phase}</p>
          <p style=${{margin:"2px 0 0",fontSize:15,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${w.title}</p>
        </div>
        <span class="mono" style=${{fontSize:13,color:"var(--color-text-tertiary)",flexShrink:0}}>${dc}/${w.sessions.length}</span>
      </button>`;
  };
  const progLabel = p => (p.program_json && p.program_json.name && p.program_json.name.trim())
    ? p.program_json.name.trim()
    : `${(GOAL_META[p.goal] || { label: p.goal }).label} · ${((p.program_json && p.program_json.weeksCount) || (p.program_json && p.program_json.weeks || []).length)} uker`;

  return html`
    <div>
      ${programs.length > 0 && html`
        <div style=${{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
          ${[["builtin","12-ukers"], ...programs.map(p=>[p.id, progLabel(p)])].map(([id,label])=>html`
            <button key=${id} onClick=${()=>setProgTab(id)} style=${{
              flexShrink:0,padding:"8px 15px",fontSize:13,fontWeight:progTab===id?600:500,borderRadius:20,
              background:progTab===id?"var(--color-accent)":"var(--color-background-primary)",color:progTab===id?"#fff":"var(--color-text-secondary)",
              border:progTab===id?"none":"0.5px solid var(--color-border-tertiary)"}}>${label}</button>`)}
        </div>`}

      <${ReadinessCard} readiness=${readiness} whoopConnected=${whoopConnected} whoopReauth=${whoopReauth}
        onManualCheck=${onManualCheck} onConnectWhoop=${onConnectWhoop} onDisconnectWhoop=${onDisconnectWhoop}/>
      <${MotivationCard} log=${log} activeProgram=${activeProgram}/>
      ${custom && html`<${WeekCalendar} program=${custom} log=${log} onOpen=${onOpenSession}/>`}

      ${next && html`
        <button onClick=${()=>onOpenSession(next)} class="card" style=${{
          width:"100%",textAlign:"left",cursor:"pointer",padding:"18px 20px",marginBottom:18,display:"block"}}>
          <p class="eyebrow" style=${{margin:"0 0 8px",color:"var(--color-accent-dark)"}}>Neste økt</p>
          <p style=${{margin:"0 0 12px",fontSize:22,fontWeight:600,letterSpacing:"-0.01em",lineHeight:1.15}}>Uke ${next.week} · ${next.plannedDay}${next.timeOfDay ? ` (${next.timeOfDay})` : ""}${next.plannedDate ? ` ${(d=>`${d.getDate()}.${d.getMonth()+1}`)(parseKey(next.plannedDate))}` : ""}${next.type === "strength" ? " · Styrke" : ""}</p>
          <p class="mono" style=${{margin:0,fontSize:13,color:"var(--color-text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${segmentSummary(next)}</p>

function StatsView({ log, unit, extraSessions }) {
  const sessions = [...allSessions(), ...(extraSessions || [])];
  const doneAll = sessions.filter(s => log[s.id] && log[s.id].done);
  const withThr = doneAll.map(s => ({ s, r: log[s.id] }))
    .filter(x => x.r.threshold_kmh != null)
    .sort((a,b)=>parseKey(a.r.done_date||todayKey())-parseKey(b.r.done_date||todayKey()));

  const totalMin = doneAll.reduce((sum,s)=>sum+sessionMinutes(s),0);
  const totalKm = Math.round(doneAll.reduce((sum,s)=>{ const r=log[s.id]; return sum + (r&&r.distance_m ? r.distance_m/1000 : 0); },0) * 10)/10;

  // fase-progresjon
  const phases = [...new Set(PROGRAM.weeks.map(w=>w.phase))];
  const phaseStats = phases.map(p=>{
    const wk = PROGRAM.weeks.filter(w=>w.phase===p);
    const total = wk.reduce((a,w)=>a+w.sessions.length,0);
    const done = wk.reduce((a,w)=>a+w.sessions.filter(s=>log[s.id]&&log[s.id].done).length,0);
    return { p, total, done };
  });

  const notes = sessions.map(s=>({ s, r: log[s.id] }))
    .filter(x => x.r && (x.r.note || x.r.rpe != null || x.r.feeling))
    .sort((a,b)=> parseKey(b.r.done_date||todayKey()) - parseKey(a.r.done_date||todayKey()));

  // Fart per puls = meter per hjerteslag i arbeidsdelen. Løper du fortere på samme
  // puls, stiger tallet – det er dette som faktisk sier noe om form. Rå puls alene
  // gjør det ikke: den styres like mye av varme, søvn og stress som av formen.
  const effPoints = sessions.map(s=>({ s, r: log[s.id] }))
    .filter(x => x.r && x.r.done && x.r.work_hr > 0 && x.r.threshold_kmh > 0 && x.s.type !== "strength")
    .sort((a,b)=> parseKey(a.r.done_date||todayKey()) - parseKey(b.r.done_date||todayKey()))
    .map(x => ({ mpb: (x.r.threshold_kmh * 1000 / 60) / x.r.work_hr, date: x.r.done_date }));
  const weekKm = PROGRAM.weeks.map(w => ({
    week: w.week,
    km: Math.round(w.sessions.reduce((sum,s)=>{ const r=log[s.id]; return sum + (r&&r.distance_m ? r.distance_m/1000 : 0); },0) * 10)/10,
  }));
  const anyKm = weekKm.some(w => w.km > 0);

  return html`
    <div>
      <div class="metric-grid" style=${{gridTemplateColumns:"1fr 1fr 1fr",marginBottom:16}}>
        <div class="metric-cell">
          <div class="lab">Økter</div>
          <div class="val">${doneAll.length}</div>
        </div>
        <div class="metric-cell">
          <div class="lab">Km totalt</div>
          <div class="val">${totalKm}</div>
        </div>
        <div class="metric-cell">
          <div class="lab">Minutter</div>
          <div class="val">${totalMin}</div>
        </div>
      </div>

      <div class="card" style=${{padding:"18px",marginBottom:16}}>
        <p class="eyebrow" style=${{margin:"0 0 4px"}}>Arbeidsfart over tid</p>
        <p style=${{margin:"0 0 14px",fontSize:13,color:"var(--color-text-tertiary)"}}>${unit==="pace"?"min/km (lavere = raskere)":"km/t (høyere = raskere)"}</p>
        ${withThr.length < 2
          ? html`<p style=${{color:"var(--color-text-secondary)",fontSize:14,paddingBottom:6}}>Logg arbeidsfart på minst to økter for å se utviklingen.</p>`
          : html`<${LineChart} points=${withThr.map(x=>({date:x.r.done_date,kmh:x.r.threshold_kmh}))} unit=${unit}/>`}
      </div>

      ${effPoints.length >= 2 && html`
        <div class="card" style=${{padding:"18px",marginBottom:16}}>
          <p class="eyebrow" style=${{margin:"0 0 4px"}}>Fart per puls</p>
          <p style=${{margin:"0 0 14px",fontSize:13,color:"var(--color-text-tertiary)"}}>Meter per hjerteslag – stiger den, er formen bedre</p>
          <${EffChart} points=${effPoints}/>
          <p style=${{margin:"10px 0 0",fontSize:12,color:"var(--color-text-tertiary)",lineHeight:1.5}}>Sammenlign helst like økter: tallet påvirkes også av hvor hardt du gikk ut.</p>
        </div>`}

      ${anyKm && html`
        <div class="card" style=${{padding:"18px",marginBottom:16}}>
          <p class="eyebrow" style=${{margin:"0 0 14px"}}>Distanse per uke (km)</p>
          <${VolumeChart} weeks=${weekKm}/>
        </div>`}

      <div class="card" style=${{padding:"18px"}}>
        <p class="eyebrow" style=${{margin:"0 0 14px"}}>Fremgang per fase</p>
        ${phaseStats.map(ps=>html`
          <div key=${ps.p} style=${{marginBottom:12}}>
            <div style=${{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style=${{fontSize:13}}>${ps.p}</span>
              <span class="mono" style=${{fontSize:13,color:"var(--color-text-secondary)"}}>${ps.done}/${ps.total}</span>
            </div>
            <div style=${{height:8,borderRadius:4,background:"var(--color-background-secondary)",overflow:"hidden"}}>
              <div style=${{height:"100%",width:`${Math.round((ps.done/ps.total)*100)}%`,background:"var(--color-accent)",borderRadius:4,transition:"width 0.5s"}}></div>
            </div>
          </div>`)}
      </div>

      ${notes.length > 0 && html`
        <div class="card" style=${{padding:"18px",marginTop:16}}>
          <p class="eyebrow" style=${{margin:"0 0 12px"}}>Notater</p>
          ${notes.map((x,i)=>html`
            <div key=${x.s.id} style=${{padding:"10px 0",borderTop:i===0?"none":"0.5px solid var(--color-border-tertiary)"}}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8}}>
                <span style=${{fontSize:13,fontWeight:500}}>Uke ${x.s.week} · ${x.s.plannedDay}${x.s.timeOfDay ? ` (${x.s.timeOfDay})` : ""}${x.s.type==="strength"?" · Styrke":""}</span>
                <span class="mono" style=${{fontSize:12,color:"var(--color-text-tertiary)",flexShrink:0}}>${x.r.done_date||""}</span>
              </div>
              ${(x.r.rpe != null || x.r.feeling) && html`<p style=${{margin:"3px 0 0",fontSize:12,color:"var(--color-text-tertiary)"}}>${x.r.rpe != null ? `RPE ${x.r.rpe}` : ""}${x.r.rpe != null && x.r.feeling ? " · " : ""}${x.r.feeling ? `føltes ${x.r.feeling}` : ""}</p>`}
              ${x.r.note && html`<p style=${{margin:"3px 0 0",fontSize:13,lineHeight:1.5,color:"var(--color-text-secondary)"}}>${x.r.note}</p>`}
            </div>`)}
        </div>`}
    </div>
  `;
}

function AxisChart({ vals, dates, fmt, color }) {
  const W=320, H=150, padL=46, padR=16, padT=16, padB=22;
  const n = vals.length;
  const min = Math.min(...vals), max = Math.max(...vals), span = (max-min)||1;
  const x = i => padL + (i/Math.max(1,n-1))*(W-padL-padR);
  const y = v => padT + ((max-v)/span)*(H-padT-padB); // høyest verdi øverst
  const path = vals.map((v,i)=>`${i===0?"M":"L"} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ");
  const yRefs = [max, (max+min)/2, min];
  const dLabel = d => { if(!d) return ""; const dt=parseKey(d); return `${dt.getDate()}.${dt.getMonth()+1}`; };
  const xIdx = n>2 ? [0, Math.floor((n-1)/2), n-1] : vals.map((_,i)=>i);
  const last = vals[n-1];
  return html`
    <svg viewBox="0 0 ${W} ${H}" style=${{width:"100%",height:"auto",display:"block"}}>
      ${yRefs.map((v,i)=>html`
        <line key=${"g"+i} x1=${padL} y1=${y(v).toFixed(1)} x2=${W-padR} y2=${y(v).toFixed(1)} stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
        <text key=${"yt"+i} x=${padL-6} y=${(y(v)+3).toFixed(1)} font-size="9" font-family="var(--font-mono)" fill="var(--color-text-tertiary)" text-anchor="end">${fmt(v)}</text>`)}
      <path d=${path} fill="none" stroke=${color} stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${vals.map((v,i)=>html`<circle key=${"c"+i} cx=${x(i).toFixed(1)} cy=${y(v).toFixed(1)} r="3" fill=${color}/>`)}
      ${xIdx.map((i,j)=>html`<text key=${"xt"+j} x=${x(i).toFixed(1)} y=${H-6} font-size="9" font-family="var(--font-mono)" fill="var(--color-text-tertiary)" text-anchor=${i===0?"start":i===n-1?"end":"middle"}>${dLabel(dates[i])}</text>`)}
      <text x=${(x(n-1)).toFixed(1)} y=${(y(last)-8).toFixed(1)} font-size="11" font-weight="700" font-family="var(--font-mono)" fill=${color} text-anchor="end">${fmt(last)}</text>
    </svg>`;
}

function LineChart({ points, unit }) {
  return html`<${AxisChart}
    vals=${points.map(p=>p.kmh)}
    dates=${points.map(p=>p.date)}
    fmt=${k => unit==="pace" ? kmhToPace(k) : (Math.round(k*10)/10)+""}
    color="var(--color-accent)"/>`;
}

function EffChart({ points }) {
  return html`<${AxisChart}
    vals=${points.map(p=>p.mpb)}
    dates=${points.map(p=>p.date)}
    fmt=${v => (Math.round(v*100)/100).toFixed(2)}
    color="var(--color-accent)"/>`;
}

function VolumeChart({ weeks }) {
  const max = Math.max(...weeks.map(w=>w.km), 1);
  return html`
    <div style=${{display:"flex",alignItems:"flex-end",gap:3,height:110}}>
      ${weeks.map(w=>html`
        <div key=${w.week} style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,height:"100%",justifyContent:"flex-end"}}>
          ${w.km>0 ? html`<span class="mono" style=${{fontSize:9,fontWeight:600,color:"var(--color-text-secondary)"}}>${w.km}</span>` : ""}
          <div style=${{width:"72%",height:`${Math.round((w.km/max)*68)}px`,minHeight:w.km>0?3:0,background:"var(--color-accent)",borderRadius:3}}></div>
          <span class="mono" style=${{fontSize:9,color:"var(--color-text-tertiary)"}}>${w.week}</span>
        </div>`)}
    </div>`;
}

function LoginScreen() {
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const msg = (error) => {
    const m = (error.message || "").toLowerCase();
    if (m.includes("already registered") || m.includes("already been registered")) return "Denne e-posten har allerede en konto. Velg «Logg inn».";
    if (m.includes("at least") || m.includes("password should")) return "Passordet må være minst 6 tegn.";
    if (m.includes("invalid login") || m.includes("invalid credentials")) return "Feil e-post eller passord.";
    return error.message;
  };
  const submit = async () => {
    const e = email.trim();
    if (!e || !pw) return;
    setBusy(true); setErr("");
    const { error } = mode === "signup"
      ? await db.auth.signUp({ email: e, password: pw })
      : await db.auth.signInWithPassword({ email: e, password: pw });
    setBusy(false);
    if (error) setErr(msg(error));
    // Ved suksess oppdaterer onAuthStateChange appen -> innlogget
  };
  return html`
    <div style=${{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"24px",maxWidth:420,margin:"0 auto"}}>
      <div style=${{textAlign:"center",marginBottom:28}}>
        <i class="ti ti-run" style=${{fontSize:40,color:"var(--color-accent)",display:"block",marginBottom:10}}></i>
        <h1 style=${{margin:0,fontSize:26,fontWeight:600,letterSpacing:"-0.02em"}}>Flyt</h1>
        <p style=${{margin:"6px 0 0",fontSize:14,color:"var(--color-text-secondary)"}}>${mode==="signup" ? "Opprett din egen treningslogg" : "Logg inn for din egen treningslogg"}</p>
      </div>
      <div class="card" style=${{padding:"20px"}}>
        <form onSubmit=${e=>{ e.preventDefault(); submit(); }}>
          <label for="login-email" style=${{display:"block",fontSize:13,color:"var(--color-text-secondary)",marginBottom:6}}>E-post</label>
          <input id="login-email" name="email" type="email" inputmode="email" autocomplete="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="deg@epost.no"
            style=${{width:"100%",boxSizing:"border-box",marginBottom:12}}/>
          <label for="login-password" style=${{display:"block",fontSize:13,color:"var(--color-text-secondary)",marginBottom:6}}>Passord</label>
          <input id="login-password" name="password" type="password" autocomplete=${mode==="signup"?"new-password":"current-password"} value=${pw} onInput=${e=>setPw(e.target.value)} placeholder=${mode==="signup"?"Minst 6 tegn":"Passord"}
            style=${{width:"100%",boxSizing:"border-box",marginBottom:12}}/>
          ${err && html`<p style=${{margin:"0 0 10px",fontSize:13,color:"#ff3b30"}}>${err}</p>`}
          <button type="submit" disabled=${busy||!email.trim()||!pw} class="btn-primary" style=${{width:"100%",padding:"14px",fontSize:15}}>
            ${busy ? "Vent…" : (mode==="signup" ? "Opprett konto" : "Logg inn")}
          </button>
        </form>
        <button type="button" onClick=${()=>{ setMode(mode==="signup"?"signin":"signup"); setErr(""); }} style=${{width:"100%",marginTop:12,padding:"8px",fontSize:13,fontWeight:600,background:"none",border:"none",color:"var(--color-accent-dark)"}}>
          ${mode==="signup" ? "Har du konto? Logg inn" : "Ny her? Opprett konto"}
        </button>
      </div>
      <p style=${{margin:"14px 4px 0",fontSize:12,color:"var(--color-text-tertiary)",textAlign:"center"}}>Du forblir innlogget. iPhone kan lagre passordet og fylle det inn med Face ID.</p>
    </div>`;
}

          <p style=${{margin:0,fontSize:13.5,opacity:0.92,lineHeight:1.5}}>For nybegynnere og for å komme tilbake fra skade. Et ferdig løp fra boka: 12 uker, tre økter i uka, guidet med stemme.</p>

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("program");    // program | stats
  const [view, setView] = useState({ name: "list" }); // list | week | session
  const [log, setLog] = useState({});
  const [ready, setReady] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [unit, setUnit] = useState(() => localStorage.getItem("speedUnit") || "kmh");
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem("lp_darkMode") || "system");
  const [voiceOn, setVoiceOnState] = useState(() => localStorage.getItem("voiceOn") !== "0");
  const [voiceURI, setVoiceURIState] = useState(() => localStorage.getItem("voiceURI") || "");
  const setVoiceOn = (v) => { setVoiceOnState(v); localStorage.setItem("voiceOn", v ? "1" : "0"); };
  const setVoiceURI = (v) => { setVoiceURIState(v); localStorage.setItem("voiceURI", v || ""); };
  const [confirmLogout, setConfirmLogout] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [thresholdKmh, setThresholdKmh] = useState(null);
  const [maxHR, setMaxHR] = useState(null);
  const [pThr, setPThr] = useState(null);
  const [pMaxHR, setPMaxHR] = useState(null);
  const [stravaConnected, setStravaConnected] = useState(false);
  const [profile, setProfile] = useState({});
  const [programs, setPrograms] = useState([]);
  const [progTab, setProgTab] = useState("builtin");
  const [choosing, setChoosing] = useState(false);
  const [showBuilder, setShowBuilder] = useState(false);
  const [showManualCheck, setShowManualCheck] = useState(false);
  const [readiness, setReadiness] = useState(null);
  const [whoopConnected, setWhoopConnected] = useState(false);
  const [whoopReauth, setWhoopReauth] = useState(false);
  const [notifyOn, setNotifyOnState] = useState(() => localStorage.getItem("lp_notify") === "1");

  // Henter dagens dagsform: Whoop-recovery (auto) foran manuell sjekk (fallback).
  // Cachen valideres mot HVILKEN Whoop-cycle den gjelder, ikke mot kalenderdatoen:
  // en Whoop-cycle bytter når du sover, ikke ved midnatt. Åpner du appen etter
  // midnatt men FØR du har sovet, er nyeste cycle fortsatt gårsdagens – da må ikke
  // gårsdagens recovery bli stående som «dagens» resten av døgnet.
  const whoopConnRef = useRef(false);
  const readinessRef = useRef(null);
  const lastSyncRef = useRef(0);
  // Sperre mot samtidige kall: 22.-23.07 kjørte to-tre samtidige syncReadiness-kall
  // (utløst av at data-lasting-effekten kjørte flere ganger per appåpning, se over)
  // om HVER SIN refresh av samme Whoop refresh-token. Whoops refresh-token er
  // engangsbruk/roterende – samtidige innløsninger av samme token gjorde at
  // fornyelsen sluttet å virke varig (måtte koble fra/til på nytt). Denne sperren
  // gjør at kun ett syncReadiness-kall er i gang om gangen, uansett hva som utløste det.
  const syncingReadinessRef = useRef(false);
  useEffect(()=>{ readinessRef.current = readiness; }, [readiness]);
  const sameNum = (a,b) => a != null && b != null && Math.abs(a-b) < 1e-6;
  // Er dette faktisk NY data? Man får aldri samme recovery/hvilepuls/HRV to dager
  // på rad, så identiske tall (eller samme cycle) som forrige lagrede dag betyr at
  // Whoop ennå ikke har regnet ut morgenens score.
  function isFreshRecovery(rec, prev) {
    if (!rec || rec.score == null) return false;
    if (!prev) return true;
    if (prev.cycle_id != null && rec.cycle_id != null) return String(prev.cycle_id) !== String(rec.cycle_id);
    return !(sameNum(rec.score, prev.recovery_score) && sameNum(rec.hrv, prev.hrv) && sameNum(rec.resting_hr, prev.resting_hr));
  }
  async function syncReadiness(wConn) {
    // Kun ett kall om gangen (se forklaring ved syncingReadinessRef over) – hopper
    // over i stedet for å kø-legge, siden et kall som alt er i gang henter fersk nok data.
    if (syncingReadinessRef.current) return;
    syncingReadinessRef.current = true;
    try {
      let r = await loadTodayReadiness();
      if (!wConn) { setReadiness(r); return; }
      const known = (r && r.source === "whoop" && r.cycle_id != null) ? r.cycle_id : null;
      const rec = await whoopCall({ action:"recovery", known_cycle: known });
      // Fortsatt samme cycle som den lagrede raden → cachen er gyldig, ingen ny henting.
      if (rec && rec.status === "unchanged") { setReadiness(r); setWhoopReauth(false); return; }
      // Edge-funksjonen klarte å lese tilkoblingen, men Whoop avviste fornyelsen av
      // access-tokenet (f.eks. fordi refresh-tokenet er brukt opp/ugyldiggjort) –
      // da hjelper det ikke å prøve på nytt, bruker må koble til Whoop på nytt.
      if (rec && rec.error === "reauth_required") { setWhoopReauth(true); setReadiness(r); return; }
      setWhoopReauth(false);
      const prev = await loadLastReadinessBefore(todayKey());
      if (isFreshRecovery(rec, prev)) {
        r = { day: todayKey(), source: "whoop", color: recoveryColor(rec.score),
              recovery_score: rec.score, hrv: rec.hrv ?? null, resting_hr: rec.resting_hr ?? null,
              sleep_pct: rec.sleep_pct ?? null, cycle_id: rec.cycle_id ?? null };
        try { await saveReadiness(r); } catch {}
      }
      // Ellers: behold raden vi alt har. Guarden skal hindre at GAMMEL data skrives,
      // ikke skjule data som alt er riktig. Whoop kan melde en nyere cycle som ennå
      // ikke er scoret (f.eks. etter en blund) – da er dagens lagrede score fortsatt
      // det beste vi har, og den overskrives så snart en ny score foreligger.
      setReadiness(r);
    } finally {
      syncingReadinessRef.current = false;
    }
  }

  useEffect(() => {
    const body = document.body;
    body.classList.remove("force-dark","force-light");
    if (darkMode === "dark") body.classList.add("force-dark");
    else if (darkMode === "light") body.classList.add("force-light");
    localStorage.setItem("lp_darkMode", darkMode);
  }, [darkMode]);
  const toggleDark = () => setDarkMode(m => m === "dark" ? "light" : m === "light" ? "system" : "dark");
  const toggleUnit = () => setUnit(u => { const n = u==="kmh"?"pace":"kmh"; localStorage.setItem("speedUnit", n); return n; });

  useEffect(()=>{
    db.auth.getSession().then(({data})=>{ setSession(data.session); setAuthReady(true); });
    const { data: sub } = db.auth.onAuthStateChange((_e, s)=>setSession(s));
    return ()=>{ try { sub.subscription.unsubscribe(); } catch {} };
  },[]);
  // NB: avhenger av bruker-ID, ikke av `session`-objektet selv. Supabase kaller
  // onAuthStateChange på nytt (nytt session-objekt, samme bruker) både ved
  // getSession()-oppstart OG hver gang JWT-en fornyes automatisk – med `session`
  // som dependency kjørte HELE denne blokken (inkl. Whoop-synk) flere ganger
  // samtidig ved hver appåpning. Det var det som utløste Whoop-bugen 22.-23.07:
  // flere samtidige "recovery"-kall delte samme (éngangs-)refresh-token og kappet
  // om å løse den inn hos Whoop – se «syncingReadinessRef»-sperren under også.
  const sessionUserId = session && session.user && session.user.id;
  useEffect(()=>{ if(session){ (async()=>{
    setLog(await loadLog()); setReady(true);
    try {
      const p = await loadProfile();
      setProfile(p);
      setThresholdKmh(p.threshold_kmh ?? null);
      setMaxHR(p.max_hr ?? null);
    } catch {}
    try {
      const progs = await loadPrograms();
      setPrograms(progs);
      const act = progs.find(p => p.active);
      if (act) setProgTab(act.id);
    } catch {}
    try {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      if (code) {
        // state-parameteret skiller Whoop-retur fra Strava-retur (samme redirect-URI)
        if ((params.get("state") || "").startsWith("whoop")) await whoopCall({ action:"exchange", code, redirect: location.origin + location.pathname });
        else await stravaCall({ action:"exchange", code });
        history.replaceState({}, "", location.pathname);
      }
      const st = await stravaCall({ action:"status" });
      setStravaConnected(!!(st && st.connected));
    } catch {}
    try {
      const wst = await whoopCall({ action:"status" });
      const wConn = !!(wst && wst.connected);
      setWhoopConnected(wConn);
      whoopConnRef.current = wConn;
      await syncReadiness(wConn);
      lastSyncRef.current = Date.now();
    } catch {}
  })(); } },[sessionUserId]);

  // iOS-PWA på hjemskjerm laster ikke siden på nytt når man åpner den igjen – den
  // gjenopptar frosset tilstand. Hent derfor dagsform på nytt når appen kommer i
  // forgrunnen på en NY dag, så morgenens Whoop-recovery faktisk vises.
  useEffect(()=>{ if(!session) return;
    const onForeground = ()=>{
      if (document.visibilityState === "hidden") return;
      if (!whoopConnRef.current) return;
      // Sjekk mot Whoop maks hvert 5. minutt (ett lite cycle-kall når ingenting er nytt),
      // men alltid hvis vi ikke har dagsform å vise.
      const cur = readinessRef.current;
      const fresh = cur && cur.day === todayKey();
      if (fresh && Date.now() - lastSyncRef.current < 5*60*1000) return;
      lastSyncRef.current = Date.now();
      syncReadiness(whoopConnRef.current);
    };
    document.addEventListener("visibilitychange", onForeground);
    window.addEventListener("focus", onForeground);
    window.addEventListener("pageshow", onForeground);
    return ()=>{
      document.removeEventListener("visibilitychange", onForeground);
      window.removeEventListener("focus", onForeground);
      window.removeEventListener("pageshow", onForeground);
    };
  },[session]);
  const saveProfileFields = async (patch) => {
    const next = { threshold_kmh: patch.threshold_kmh !== undefined ? patch.threshold_kmh : thresholdKmh, max_hr: patch.max_hr !== undefined ? patch.max_hr : maxHR };
    setThresholdKmh(next.threshold_kmh); setMaxHR(next.max_hr);
    setSyncing(true); await saveProfile(next); setSyncing(false);
  };
  const logout = async ()=>{ await db.auth.signOut(); setLog({}); setReady(false); setView({name:"list"}); setTab("program"); setStravaConnected(false); setThresholdKmh(null); setMaxHR(null); setProfile({}); setPrograms([]); setProgTab("builtin"); setReadiness(null); setWhoopConnected(false); };
  const connectStrava = () => {
    const redirect = location.origin + location.pathname;
    location.href = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=code&approval_prompt=auto&scope=activity:read_all`;
  };
  const disconnectStrava = async () => { await stravaCall({ action:"disconnect" }); setStravaConnected(false); };
  const connectWhoop = async () => {
    const r = await whoopCall({ action:"auth_url", redirect: location.origin + location.pathname });
    if (r && r.url) location.href = r.url;
  };
  const disconnectWhoop = async () => { await whoopCall({ action:"disconnect" }); setWhoopConnected(false); setWhoopReauth(false); };
  const toggleNotify = async () => {
    if (!notifyOn) {
      try { if ("Notification" in window && Notification.permission !== "granted") await Notification.requestPermission(); } catch {}
    }
    const v = !notifyOn;
    setNotifyOnState(v); localStorage.setItem("lp_notify", v ? "1" : "0");
  };
  const refreshPrograms = async (selectId) => {
    const progs = await loadPrograms();
    setPrograms(progs);
    if (selectId) setProgTab(selectId);
    else if (progTab !== "builtin" && !progs.find(p => p.id === progTab)) setProgTab("builtin");
  };
  const removeProgram = async (id) => { await deleteProgramRow(id); await refreshPrograms(); setView({ name:"list" }); };

  // Førstegangsvalg: ny bruker uten valgt vei, uten loggede økter og uten egne program
  const needsChoice = ready && !profile.program_choice
    && Object.keys(log).length === 0 && programs.length === 0;
  const chooseBuiltin = async () => {
    setChoosing(true);
    try { await saveProfile({ program_choice: "builtin" }); } catch {}
    setProfile(p => ({ ...p, program_choice: "builtin" }));
    setProgTab("builtin"); setView({ name: "list" });
    setChoosing(false);
  };
  const chooseBuildOwn = () => setShowBuilder(true);

  // A4: lokalt varsel når appen åpnes en dag med planlagt økt i aktivt generert program
  useEffect(() => {
    if (!ready || !notifyOn) return;
    try {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const act = programs.find(p => p.active);
      if (!act) return;
      const today = todayKey();
      const s = programSessions(act).find(x => x.plannedDate === today && !(log[x.id] && log[x.id].done));
      if (s && sessionStorage.getItem("lp_notified") !== today) {
        sessionStorage.setItem("lp_notified", today);
        new Notification("Flyt", { body: `I dag: ${s.type === "strength" ? `styrkeøkt (ca. ${sessionMinutes(s)} min)` : segmentSummary(s)}` });
      }
    } catch {}
  }, [ready, notifyOn, programs]);

  const saveRec = async (row) => {
    setLog(l => ({ ...l, [row.session_id]: { ...l[row.session_id], ...row } }));
    setSyncing(true); await saveSession(row); setSyncing(false);
  };
  const deleteRec = async (id) => {
    setLog(l => { const n = { ...l }; delete n[id]; return n; });
    setSyncing(true); await removeSession(id); setSyncing(false);
    setView({ name: "list" });
  };

  const openWeek = (wk) => setView({ name: "week", week: wk, prog: progTab });
  const openSession = (s) => setView({ name: "session", week: s.week, sessionId: s.id, prog: s.programId || progTab });

  const progWeeks = (prog) => {
    if (!prog || prog === "builtin") return PROGRAM.weeks;
    const p = programs.find(x => x.id === prog);
    return p ? ((p.program_json && p.program_json.weeks) || []) : [];
  };
  const weekObj = (wk, prog) => progWeeks(prog).find(w => w.week === wk);
  const sessionObj = (wk, id, prog) => {
    const w = weekObj(wk, prog); if (!w) return null;
    const s = w.sessions.find(x => x.id === id);
    return s ? { ...s, week: wk, programId: prog && prog !== "builtin" ? prog : null } : null;
  };

  if (!authReady) return html`<div style=${{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--color-text-secondary)"}}>Laster…</div>`;
  if (!session) return html`<${LoginScreen}/>`;

  let body;
  if (!ready) body = html`<p style=${{color:"var(--color-text-secondary)",textAlign:"center",paddingTop:40}}>Laster...</p>`;
  else if (tab === "stats") body = html`<${StatsView} log=${log} unit=${unit} extraSessions=${programs.flatMap(p=>programSessions(p))}/>`;
  else if (view.name === "week") body = html`<${WeekView} key=${"w"+(view.prog||"b")+view.week} week=${weekObj(view.week, view.prog)} log=${log} onBack=${()=>setView({name:"list"})} onOpen=${openSession} thresholdKmh=${thresholdKmh} maxHR=${maxHR}/>`;
  else if (view.name === "session") body = html`<${SessionView} key=${view.sessionId} session=${sessionObj(view.week, view.sessionId, view.prog)} week=${weekObj(view.week, view.prog)} log=${log} unit=${unit} voiceOn=${voiceOn} setVoiceOn=${setVoiceOn} voiceURI=${voiceURI} setVoiceURI=${setVoiceURI} stravaConnected=${stravaConnected} maxHR=${maxHR} thresholdKmh=${thresholdKmh} readiness=${readiness} onBack=${()=>setView({name:"week",week:view.week,prog:view.prog})} onSave=${saveRec} onDelete=${deleteRec}/>`;
  else body = html`<${ProgramView} log=${log} onOpenWeek=${openWeek} onOpenSession=${openSession} stravaConnected=${stravaConnected} onConnectStrava=${connectStrava} onDisconnectStrava=${disconnectStrava}
    programs=${programs} progTab=${progTab} setProgTab=${setProgTab} onOpenBuilder=${()=>setShowBuilder(true)} onDeleteProgram=${removeProgram}
    readiness=${readiness} whoopConnected=${whoopConnected} whoopReauth=${whoopReauth} onManualCheck=${()=>setShowManualCheck(true)} onConnectWhoop=${connectWhoop} onDisconnectWhoop=${disconnectWhoop}
    notifyOn=${notifyOn} onToggleNotify=${toggleNotify}/>`;

  const title = tab==="stats" ? "Statistikk" : "Flyt";

  return html`
    <div style=${{fontFamily:"var(--font-sans)",background:"var(--color-background-secondary)",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <div style=${{background:"var(--color-background-primary)",borderBottom:"0.5px solid var(--color-border-tertiary)",padding:"14px 18px 12px",flexShrink:0,position:"sticky",top:0,zIndex:10}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style=${{margin:0,fontSize:18,fontWeight:600}}>${title}</p>
          <div style=${{display:"flex",alignItems:"center",gap:6}}>
            ${syncing && html`<span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}>Lagrer...</span>`}
            <button onClick=${toggleUnit} style=${{background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-tertiary)",padding:"5px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)",borderRadius:6}} title="Bytt enhet">
              ${unit==="pace"?"min/km":"km/t"}
            </button>
            <button onClick=${toggleDark} style=${{background:"none",border:"none",padding:"4px 6px",fontSize:18,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1}} title="Bytt tema">
              ${darkMode==="dark"?"☀️":darkMode==="light"?"🌓":"🌙"}
            </button>
            <button onClick=${()=>{ setPThr(thresholdKmh); setPMaxHR(maxHR); setShowProfile(true); }} style=${{background:"none",border:"none",padding:"4px 6px",fontSize:16,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1}} title="Terskelfart og makspuls">
              <i class="ti ti-heartbeat"></i>
            </button>
            <button onClick=${()=>setShowHelp(true)} style=${{background:"none",border:"1px solid var(--color-border-secondary)",borderRadius:"50%",width:26,height:26,padding:0,fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}} title="Hvordan fungerer appen?">
              ?
            </button>
            <button onClick=${()=>setConfirmLogout(true)} style=${{background:"none",border:"none",padding:"4px 6px",fontSize:16,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1}} title="Logg ut">
              <i class="ti ti-logout"></i>
            </button>
          </div>
        </div>
      </div>
      <div style=${{flex:1,padding:"16px",overflowY:(showBuilder||showHelp||showProfile||showManualCheck||confirmLogout)?"hidden":"auto",paddingBottom:80}}>${body}</div>
      <nav style=${{background:"var(--color-background-primary)",borderTop:"0.5px solid var(--color-border-tertiary)",display:"flex",height:66,flexShrink:0,position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto"}}>
        ${[{id:"program",icon:"ti-run",label:"Program"},{id:"stats",icon:"ti-chart-line",label:"Statistikk"}].map(t => html`
          <button key=${t.id} onClick=${()=>{setTab(t.id);if(t.id==="program")setView({name:"list"});}} style=${{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:0,
            color:tab===t.id?"var(--color-accent)":"var(--color-text-secondary)"}}>
            <i class=${`ti ${t.icon}`} style=${{fontSize:22}}></i>
            <span style=${{fontSize:11,fontWeight:tab===t.id?500:400}}>${t.label}</span>
          </button>`)}
      </nav>
      ${confirmLogout && html`
        <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${()=>setConfirmLogout(false)}>
          <div onClick=${e=>e.stopPropagation()} class="card" style=${{padding:"22px",maxWidth:320,width:"100%",textAlign:"center"}}>
            <p class="eyebrow" style=${{margin:"0 0 8px"}}>Konto</p>
            <p style=${{margin:"0 0 4px",fontSize:18,fontWeight:600,letterSpacing:"-0.01em"}}>Logge ut?</p>
            <p style=${{margin:"0 0 18px",fontSize:14,color:"var(--color-text-secondary)",lineHeight:1.5}}>Du må logge inn igjen med e-post og passord.</p>
            <button onClick=${()=>{ setConfirmLogout(false); logout(); }} style=${{width:"100%",padding:"13px",fontSize:15,marginBottom:8,background:"#ff3b30",color:"#fff",border:"none"}}>Logg ut</button>
            <button onClick=${()=>setConfirmLogout(false)} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Avbryt</button>
          </div>
        </div>`}
      ${showHelp && html`
        <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick=${()=>setShowHelp(false)}>
          <div onClick=${e=>e.stopPropagation()} style=${{background:"var(--color-background-primary)",borderTop:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg) var(--border-radius-lg) 0 0",padding:"20px 22px 26px",maxWidth:480,width:"100%",maxHeight:"85vh",overflowY:"auto",boxSizing:"border-box",overscrollBehavior:"contain"}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <p class="eyebrow" style=${{margin:"0 0 5px"}}>Hjelp</p>
                <p style=${{margin:0,fontSize:20,fontWeight:600,letterSpacing:"-0.01em"}}>Hvordan appen fungerer</p>
              </div>
              <button onClick=${()=>setShowHelp(false)} style=${{background:"none",border:"none",fontSize:20,color:"var(--color-text-secondary)",cursor:"pointer",padding:4}}><i class="ti ti-x"></i></button>
            </div>
            ${[
              ["ti-run","Program","12 uker med økter. Trykk på en uke, så på en økt for å se detaljer. Kryss av økter du har fullført og loggfør fart/puls."],
              ["ti-player-play","Guidet økt","Åpne en økt og trykk «Start guidet økt». Har økten et intervall med et antall (f.eks. 5-10 x terskel), velger appen automatisk høyeste antall – trykk «Hopp» for å ta færre. Timeren teller ned hvert steg med lydsignal/stemme ved bytte."],
              ["ti-lock","Lås skjerm","Under en guidet økt kan du trykke «Lås skjerm» for en lommesikker visning som ikke reagerer på tilfeldige trykk. Hold inne knappen nederst for å låse opp igjen."],
              ["ti-volume","Stemme","Skru på stemme før du starter, så sier appen hva som kommer og teller ned de siste sekundene. Velger du en norsk stemme, må den kanskje lastes ned i telefonens innstillinger først."],
              ["ti-chart-line","Statistikk","Viser utvikling i fart og puls over tid, hentet fra det du har loggført eller fra Strava."],
              ["ti-brand-strava","Strava","Koble til Strava under Program-fanen for å hente fart og puls automatisk fra aktiviteten din i stedet for å taste inn selv."],
              ["ti-heartbeat","Gylne sonen","Fyll inn terskelfart og makspuls under hjerte-ikonet, så viser hver økt hvilken puls du bør ligge på for intensiteten (f.eks. terskel = 80-87% av makspuls, boken kaller det «den gylne sonen»)."],
              ["ti-bolt","Fartskalkulator","Intervall-drag viser også en anbefalt fart-range, regnet ut fra terskelfarten din og draglengden – jo lengre drag, jo roligere fart. I egne bygde program brukes bokas sek/km-tempoguide i stedet."],
              ["ti-wand","Bygg eget program","Etter (eller ved siden av) 12-ukers-programmet kan du bygge ditt eget: velg mål, dato, økter per uke og periodisering, så genereres et program etter bokas modell (80/20, tre nøkkeløkter, 10 % volumtrapp og nedtrapping mot løpsdag)."],
              ["ti-traffic-lights","Trafikklys","Dagsformen vises som grønt/gult/rødt lys – automatisk fra Whoop recovery (grønn ≥ 67 %) eller via en manuell 30-sek sjekk. Grønt: forleng nøkkeløkten 30-40 %. Gult: som planlagt. Rødt: hopp av, ta en dag fri. Og husk: ryker en økt, ikke ta den igjen – styr fremover."],
              ["ti-barbell","Styrke","Egne program kan inkludere 0-2 styrkeøkter/uke (anbefales ut fra alder og skadehistorikk). Øktene guides av samme timer med stemme: Myrtl-oppvarming + enbens-styrkeøvelser."],
              ["ti-copy","Strava-tekst","Hver økt har en ferdig beskrivelse («5 min oppvarming, 8 x 5 min terskel @ 4:10 …») du kan kopiere rett inn i Strava. Farten er den du faktisk løp når økten er hentet fra Strava."],
              ["ti-bell","Påminnelser","Skru på påminnelser på Program-fanen, så varsler appen når du åpner den en dag med planlagt økt."],
              ["ti-moon","Tema og enhet","Månen øverst bytter mellom lyst/mørkt/system-tema. Knappen med km/t eller min/km bytter hvilken enhet fart vises i."],
            ].map(([icon,title,text])=>html`
              <div style=${{display:"flex",gap:12,marginBottom:16}}>
                <i class=${`ti ${icon}`} style=${{fontSize:20,color:"var(--color-accent)",flexShrink:0,marginTop:2}}></i>
                <div>
                  <p style=${{margin:"0 0 3px",fontSize:14,fontWeight:600}}>${title}</p>
                  <p style=${{margin:0,fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.5}}>${text}</p>
                </div>
              </div>`)}
            <button onClick=${()=>setShowHelp(false)} class="btn-primary" style=${{width:"100%",padding:"13px",fontSize:15,marginTop:4}}>Lukk</button>
          </div>
        </div>`}
      ${showProfile && html`
        <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${()=>setShowProfile(false)}>
          <div onClick=${e=>e.stopPropagation()} class="card" style=${{padding:"22px",maxWidth:360,width:"100%"}}>
            <p class="eyebrow" style=${{margin:"0 0 5px"}}>Gylne sonen</p>
            <p style=${{margin:"0 0 4px",fontSize:19,fontWeight:600,letterSpacing:"-0.01em"}}>Terskelfart og makspuls</p>
            <p style=${{margin:"0 0 18px",fontSize:13,color:"var(--color-text-secondary)",lineHeight:1.5}}>Brukes til å regne ut «den gylne sonen» – hvilken puls du bør ligge på i hver økt (80-87% av makspuls for terskeløkter).</p>
            <div style=${{marginBottom:14}}>
              <${SpeedInput} label="Terskelfart" kmh=${pThr} unit=${unit} onChange=${setPThr}/>
            </div>
            <div style=${{marginBottom:18}}>
              <label style=${{display:"block",fontSize:12,color:"var(--color-text-secondary)",marginBottom:5}}>Makspuls</label>
              <input class="mono" type="number" inputmode="numeric" step="1" value=${pMaxHR ?? ""} placeholder="slag/min"
                onInput=${e=>setPMaxHR(e.target.value ? parseInt(e.target.value,10) : null)}
                style=${{width:"100%",boxSizing:"border-box"}}/>
              <span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}>slag/min</span>
            </div>
            ${pMaxHR > 0 && html`
              <div style=${{marginBottom:18,paddingTop:14,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
                <p class="eyebrow" style=${{margin:"0 0 2px"}}>Pulssoner</p>
                <p style=${{margin:"0 0 10px",fontSize:12,color:"var(--color-text-tertiary)",lineHeight:1.5}}>Olympiatoppens modell, regnet av makspulsen din – til sammenligning med klokka.</p>
                ${OT_ZONES.map(z=>html`
                  <div key=${z.n} style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10,padding:"5px 0"}}>
                    <span style=${{fontSize:13}}>Sone ${z.n} · ${z.label}<span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}> · ${z.note}</span></span>
                    <span class="mono" style=${{fontSize:13,color:"var(--color-text-secondary)",flexShrink:0,whiteSpace:"nowrap"}}>${Math.round(z.pct[0]/100*pMaxHR)}–${Math.round(z.pct[1]/100*pMaxHR)}</span>
                  </div>`)}
                <p style=${{margin:"8px 0 0",fontSize:11,color:"var(--color-text-tertiary)",lineHeight:1.5}}>Bokas terskel (80–87 %) ligger i sone 2–3 her. Olympiatoppen kaller sone 4 «anaerob terskel» – to ulike modeller. Appen styrer etter bokas tall.</p>
              </div>`}
            <button onClick=${async()=>{ await saveProfileFields({ threshold_kmh: pThr, max_hr: pMaxHR }); setShowProfile(false); }} class="btn-primary" style=${{width:"100%",padding:"13px",fontSize:15,marginBottom:8}}>Lagre</button>
            <button onClick=${()=>setShowProfile(false)} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Avbryt</button>
          </div>
        </div>`}
      ${showBuilder && html`<${BuilderWizard} unit=${unit} thresholdKmh=${thresholdKmh} profile=${profile}
        onClose=${()=>setShowBuilder(false)}
        onCreated=${async(id)=>{ if(!profile.program_choice){ setProfile(p=>({...p,program_choice:"custom"})); try { await saveProfile({ program_choice: "custom" }); } catch {} } setShowBuilder(false); try { setProfile(await loadProfile()); } catch {} await refreshPrograms(id); setView({name:"list"}); }}/>`}
      ${needsChoice && html`<${WelcomeScreen} busy=${choosing} onChooseBuiltin=${chooseBuiltin} onBuildOwn=${chooseBuildOwn}/>`}
      ${showManualCheck && html`<${ManualCheck} profile=${profile}
        onClose=${()=>setShowManualCheck(false)}
        onSaved=${async(row)=>{ setShowManualCheck(false); setReadiness(row); try { setProfile(await loadProfile()); } catch {} }}/>`}
    </div>
  `;
}

const _rootEl = document.getElementById('root');
_rootEl.innerHTML = '';
render(html`<${App}/>`, _rootEl);
</script>
</body>
</html>
