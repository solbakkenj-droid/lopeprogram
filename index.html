async function stravaCall(body) {
  const { data, error } = await db.functions.invoke("strava", { body });
  if (error && error.context && typeof error.context.json === "function") {
    try { return await error.context.json(); } catch {}
  }
  if (error) return { error: error.message || "Feil" };
  return data;
}
const round2 = v => v == null ? null : Math.round(v*100)/100;
// Del fart-strøm (m/s) i gå-fart (rolig) og løpefart (raskt) via 1D 2-means
function splitPaces(velocity) {
  const kmh = (velocity||[]).map(v=>v*3.6).filter(v=>v>1.5);
  if (kmh.length < 6) return null;
  let a = Math.min(...kmh), b = Math.max(...kmh);
  for (let it=0; it<25; it++) {
    const ga=[], gb=[];
    for (const v of kmh) (Math.abs(v-a)<=Math.abs(v-b)?ga:gb).push(v);
    if (!ga.length || !gb.length) break;
    const na=ga.reduce((x,y)=>x+y,0)/ga.length, nb=gb.reduce((x,y)=>x+y,0)/gb.length;
    if (Math.abs(na-a)<0.01 && Math.abs(nb-b)<0.01) { a=na; b=nb; break; }
    a=na; b=nb;
  }
  const slowC=Math.min(a,b), fastC=Math.max(a,b);
  const slow=[], fast=[];
  for (const v of kmh) (Math.abs(v-slowC)<=Math.abs(v-fastC)?slow:fast).push(v);
  const med = arr => { const s=[...arr].sort((x,y)=>x-y); return s.length?s[Math.floor(s.length/2)]:null; };
  return { easy_kmh: round2(med(slow)), work_kmh: round2(med(fast)) };
}

// ─── INTENSITET ───────────────────────────────────────────────────────────────
const INTENSITY = {
  gange:            { label: "gange",             color: "#8e8e93", hard: false },
  rask_gange:       { label: "rask gange",        color: "#8e8e93", hard: false },
  svart_lett_jogg:  { label: "svært lett jogg",   color: "#34c759", hard: false },
  lett_jogg:        { label: "lett jogg",         color: "#34c759", hard: false },
  jogg:             { label: "jogg",              color: "#30b0c7", hard: false },
  rask_jogg:        { label: "rask jogg",         color: "#ff9500", hard: true  },
  litt_raskere:     { label: "litt raskere",      color: "#ff9500", hard: true  },
  terskel:          { label: "terskel",           color: "#ff3b30", hard: true  },
  rolig_lop:        { label: "rolig løp",         color: "#34c759", hard: false },
  lett_jogg_gange:  { label: "lett jogg / gange", color: "#8e8e93", hard: false },
  pause:            { label: "pause",             color: "#8e8e93", hard: false },
  hvile:            { label: "hvile",             color: "#8e8e93", hard: false },
  test:             { label: "test",              color: "#af52de", hard: true  },
};
const iLabel = k => (INTENSITY[k] || { label: k }).label;
const iColor = k => (INTENSITY[k] || { color: "#8e8e93" }).color;
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

// Rangering av intensitet (lav = rolig, høy = hardt) – brukes til å velge fart-felt
const IRANK = { hvile:0, pause:0, gange:1, rask_gange:2, lett_jogg_gange:2, svart_lett_jogg:3, rolig_lop:4, lett_jogg:4, jogg:5, litt_raskere:6, rask_jogg:6, terskel:7, test:8 };
const irank = k => (IRANK[k] ?? 4);

// Finn de to relevante fartene i en økt: rolig/restitusjon og arbeid/hardt
function sessionPaces(session) {
  const easyC = [], workC = [];
  session.segments.forEach(seg => {
    if (seg.kind === "intervals") {
      workC.push(seg.work.intensity);
      easyC.push(seg.rest.intensity);
    } else if (seg.kind === "continuous") {
      (irank(seg.intensity) >= 5 ? workC : easyC).push(seg.intensity);
    } else if (seg.kind === "warmup" || seg.kind === "cooldown") {
      easyC.push(seg.intensity);
    }
  });
  let work = workC.length ? workC.reduce((a,b)=> irank(b) > irank(a) ? b : a) : null;
  let easyPool = easyC.filter(i => i !== "pause" && i !== "hvile");
  if (!easyPool.length) easyPool = easyC;
  let easy = easyPool.length ? easyPool.reduce((a,b)=> irank(b) < irank(a) ? b : a) : null;
  if (work && work === easy) work = null;
  return { easy, work };
}

// ─── HJELPERE ─────────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function parseKey(key) {
  const p = key.split("-");
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]), 12, 0, 0);
}
const pad = n => String(n).padStart(2, "0");

// Varighet → tekst (matcher bokas stil: "90 sek", "2 min", "7:30 min")
function durText(sec) {
  if (sec % 60 === 0 && sec >= 120) return `${sec/60} min`;
  if (sec < 120) return `${sec} sek`;
  return `${Math.floor(sec/60)}:${pad(sec%60)} min`;
}
function durRangeText(range) {
  const a = durText(range[0]), b = durText(range[1]);
  const ua = a.split(" ").pop(), ub = b.split(" ").pop();
  if (ua === ub) return `${a.split(" ")[0]}–${b.split(" ")[0]} ${ub}`;
  return `${a}–${b}`;
}
function repText(seg) { return seg.repeatsRange ? `${seg.repeatsRange[0]}–${seg.repeatsRange[1]}` : `${seg.repeats}`; }

// Bygg bokas linje fra segmenter, f.eks. "5 min rask gange + 8 × (30 sek lett jogg / 90 sek gange) + 5 min rolig gange"
function segmentSummary(session) {
  return session.segments.map(seg => {
    if (seg.kind === "intervals") {
      const w = seg.work, r = seg.rest;
      return `${repText(seg)} × (${durText(w.durationSec)} ${iLabel(w.intensity)} / ${durText(r.durationSec)} ${iLabel(r.intensity)})`;
    }
    if (seg.kind === "continuous") {
      const d = seg.durationRangeSec ? durRangeText(seg.durationRangeSec) : durText(seg.durationSec);
      return `${d} ${iLabel(seg.intensity)}${seg.orRest ? " eller hvile" : ""}`;
    }
    if (seg.kind === "test") return seg.note || "Test";
    // warmup / cooldown
    const d = seg.durationRangeSec ? durRangeText(seg.durationRangeSec) : durText(seg.durationSec);
    const suffix = seg.kind === "warmup" ? "" : "";
    return `${d} ${iLabel(seg.intensity)}`;
  }).join(" + ");
}

// Estimert total tid (min) – bruker nedre grense for ranges
function sessionMinutes(session) {
  let s = 0;
  session.segments.forEach(seg => {
    if (seg.kind === "intervals") {
      const n = seg.repeatsRange ? seg.repeatsRange[0] : seg.repeats;
      s += n * (seg.work.durationSec + seg.rest.durationSec);
    } else if (seg.kind === "continuous") {
      s += seg.durationRangeSec ? seg.durationRangeSec[0] : seg.durationSec;
    } else if (seg.durationRangeSec) { s += seg.durationRangeSec[0]; }
    else if (seg.durationSec) { s += seg.durationSec; }
  });
  return Math.round(s/60);
}

// Fart-konvertering (kanonisk = km/t)
function kmhToPace(kmh) {
  if (!kmh || kmh <= 0) return "";
  const tot = Math.round(3600/kmh);
  return `${Math.floor(tot/60)}:${pad(tot%60)}`;
}
function paceToKmh(str) {
  const m = String(str).trim().match(/^(\d{1,2}):(\d{1,2})$/);
  if (!m) return null;
  const sec = parseInt(m[1])*60 + parseInt(m[2]);
  if (sec <= 0) return null;
  return Math.round((3600/sec)*100)/100;
}
function fmtSpeed(kmh, unit) {
  if (kmh == null) return "–";
  return unit === "pace" ? `${kmhToPace(kmh)} /km` : `${kmh} km/t`;
}

function allSessions() {
  const out = [];
  PROGRAM.weeks.forEach(w => w.sessions.forEach(s => out.push({ ...s, week: w.week })));
  return out;
}

// ─── LYD ──────────────────────────────────────────────────────────────────────
function playPling(times=1, freq=880) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const play = (delayMs) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine"; osc.frequency.value = freq;
      const t = ctx.currentTime + delayMs/1000;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.4,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.6);
      osc.start(t); osc.stop(t+0.6);
    };
    for (let i=0;i<times;i++) play(i*250);
  } catch {}
}

// ─── TALE (TTS) + SKJERM ──────────────────────────────────────────────────────
let VOICES = [];
function loadVoices() {
  try { VOICES = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; } catch { VOICES = []; }
  return VOICES;
}
if (window.speechSynthesis) {
  loadVoices();
  try { window.speechSynthesis.addEventListener("voiceschanged", loadVoices); } catch {}
}
function norskVoices() {
  const all = loadVoices();
  const no = all.filter(v => /^(nb|nn|no)([-_]|$)/i.test(v.lang));
  return no.length ? no : all;
}
function setDuck(on) {
  try { if (navigator.audioSession) navigator.audioSession.type = on ? "transient" : "ambient"; } catch {}
}
function say(text, voiceURI) {
  if (!window.speechSynthesis || !text) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const list = VOICES.length ? VOICES : loadVoices();
    const v = list.find(x => x.voiceURI === voiceURI);
    if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = "nb-NO"; }
    u.rate = 1.05;
    window.speechSynthesis.speak(u);
  } catch {}
}
function durSpoken(sec) {
  if (sec < 120) return `${sec} sekunder`;
  if (sec % 60 === 0) return `${sec/60} minutter`;
  const mm = Math.floor(sec/60), ss = sec%60;
  return `${mm} minutter og ${ss} sekunder`;
}
function stepSpoken(step) {
  return `${durSpoken(step.sec)} ${iLabel(step.intensity).replace("/", "eller")}`;
}

// ─── GUIDET ØKT: bygg steg-liste ──────────────────────────────────────────────
// choices: { [segIdx]: { reps?, sec? } } – for ranges
function buildSteps(session, choices) {
  const steps = [];
  session.segments.forEach((seg, si) => {
    const ch = (choices && choices[si]) || {};
    if (seg.kind === "intervals") {
      const n = seg.repeatsRange ? (ch.reps ?? seg.repeatsRange[0]) : seg.repeats;
      for (let r=0; r<n; r++) {
        steps.push({ label: `Arbeid ${r+1}/${n}`, intensity: seg.work.intensity, sec: seg.work.durationSec });
        steps.push({ label: `Pause ${r+1}/${n}`, intensity: seg.rest.intensity, sec: seg.rest.durationSec });
      }
    } else if (seg.kind === "continuous") {
      const sec = seg.durationRangeSec ? (ch.sec ?? seg.durationRangeSec[0]) : seg.durationSec;
      steps.push({ label: seg.note || iLabel(seg.intensity), intensity: seg.intensity, sec });
    } else if (seg.kind === "warmup" || seg.kind === "cooldown") {
      const sec = seg.durationRangeSec ? (ch.sec ?? seg.durationRangeSec[0]) : seg.durationSec;
      steps.push({ label: seg.kind === "warmup" ? "Oppvarming" : "Nedjogg", intensity: seg.intensity, sec });
    }
    // test-segment hoppes over i guidet modus
  });
  return steps;
}

// Fart-input: viser km/t eller pace basert på unit
function SpeedInput({ label, kmh, unit, onChange }) {
  const fmt = (k) => unit === "pace" ? kmhToPace(k) : (k ?? "");
  const [raw, setRaw] = useState(fmt(kmh));
  const lastEmitted = useRef(kmh);
  useEffect(() => { setRaw(fmt(kmh)); }, [unit]);
  // Synk visningen når verdien endres utenfra (f.eks. hentet fra Strava)
  useEffect(() => { if (kmh !== lastEmitted.current) { setRaw(fmt(kmh)); lastEmitted.current = kmh; } }, [kmh]);
  const commit = (v) => {
    setRaw(v);
    let k = null;
    if (v !== "" && v != null) {
      if (unit === "pace") k = paceToKmh(v);
      else { const p = parseFloat(String(v).replace(",", ".")); k = isNaN(p) ? null : Math.round(p*100)/100; }
    }
    lastEmitted.current = k;
    onChange(k);
  };
  return html`
    <div style=${{flex:1}}>
      <label style=${{display:"block",fontSize:12,color:"var(--color-text-secondary)",marginBottom:5}}>${label}</label>
      <input
        type=${unit==="pace"?"text":"number"} step="0.1" inputmode=${unit==="pace"?"text":"decimal"}
        value=${raw}
        placeholder=${unit==="pace"?"mm:ss":"km/t"}
        onInput=${e=>commit(e.target.value)}
        style=${{width:"100%",boxSizing:"border-box"}}/>
      <span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}>${unit==="pace"?"min/km":"km/t"}</span>
    </div>
  `;
}

function GuidedSession({ session, choices, voiceOn, voiceURI, onExit, onFinish }) {
  const steps = buildSteps(session, choices);
  const [idx, setIdx] = useState(0);
  const [rem, setRem] = useState(steps.length ? steps[0].sec : 0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [locked, setLocked] = useState(false);
  const [unlockHint, setUnlockHint] = useState(false);
  const [shield, setShield] = useState(false);
  const ref = useRef(null);
  const wakeRef = useRef(null);
  const unlockRef = useRef(null);
  const startedRef = useRef(false);
  const runningRef = useRef(false);
  const preAnn = useRef({});
  useEffect(()=>{ runningRef.current = running; },[running]);

  const acquireWake = async () => { try { if (navigator.wakeLock) wakeRef.current = await navigator.wakeLock.request("screen"); } catch {} };
  const releaseWake = () => { try { if (wakeRef.current) { wakeRef.current.release(); wakeRef.current = null; } } catch {} };
  const announce = (i) => { if (!voiceOn || !steps[i]) return; say(stepSpoken(steps[i]), voiceURI); };

  const toggleRun = () => {
    const willRun = !running;
    if (willRun) {
      setDuck(true); acquireWake();
      try { window.speechSynthesis && window.speechSynthesis.resume(); } catch {}
      if (!startedRef.current) { startedRef.current = true; announce(idx); }
    }
    setRunning(willRun);
  };

  const doUnlock = () => { setUnlockHint(false); setLocked(false); setShield(true); setTimeout(()=>setShield(false), 700); };
  const startUnlock = () => { setUnlockHint(true); unlockRef.current = setTimeout(doUnlock, 1500); };
  const cancelUnlock = () => { setUnlockHint(false); if (unlockRef.current) clearTimeout(unlockRef.current); };

  useEffect(()=>{
    const onVis = () => { if (document.visibilityState === "visible" && runningRef.current && !wakeRef.current) acquireWake(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { document.removeEventListener("visibilitychange", onVis); clearInterval(ref.current); releaseWake(); setDuck(false); };
  },[]);

  useEffect(()=>{
    if (running) {
      const cur = steps[idx], nxt = steps[idx+1];
      ref.current = setInterval(()=>{
        if (voiceOn) { try { window.speechSynthesis && window.speechSynthesis.resume(); } catch {} }
        setRem(r=>{
          if (r <= 1) return 0;
          const nr = r-1;
          if (voiceOn) {
            if (nxt && cur.sec >= 6 && nr === 5) say(stepSpoken(nxt), voiceURI);
            else if (cur.sec >= 6 && nr <= 3 && nr >= 1) say(String(nr), voiceURI);
          } else if (nr <= 3) { playPling(1, 660); }
          return nr;
        });
      },1000);
    } else clearInterval(ref.current);
    return ()=>clearInterval(ref.current);
  },[running, idx, voiceOn, voiceURI]);

  useEffect(()=>{ if (running && rem === 0) advance(); },[rem, running, idx]);

  function advance() {
    clearInterval(ref.current);
    if (idx < steps.length-1) {
      playPling(2, 880);
      const n = idx+1;
      setIdx(n); setRem(steps[n].sec);
    } else {
      playPling(3, 990);
      if (voiceOn) say("Økt fullført. Godt jobbet!", voiceURI);
      setRunning(false); setDone(true);
      releaseWake(); setDuck(false);
    }
  }

  if (!steps.length) return html`<p style=${{padding:20}}>Ingen tidsstyrte segmenter i denne økten.</p>`;

  if (done) return html`
    <div style=${{textAlign:"center",padding:"48px 20px"}}>
      <i class="ti ti-circle-check" style=${{fontSize:56,color:"#1D9E75",display:"block",marginBottom:16}}></i>
      <h2 style=${{margin:"0 0 8px",fontSize:22,fontWeight:500}}>Økt fullført!</h2>
      <p style=${{color:"var(--color-text-secondary)",marginBottom:28}}>Vil du logge farten og krysse av økten?</p>
      <button onClick=${onFinish} class="btn-primary" style=${{width:"100%",padding:"14px",fontSize:15,marginBottom:10}}>
        <i class="ti ti-check"></i> Logg og kryss av
      </button>
      <button onClick=${onExit} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Tilbake</button>
    </div>`;

  const step = steps[idx];
  const next = steps[idx+1];
  const m = Math.floor(rem/60), s = rem%60;
  const pct = step.sec ? Math.round(((step.sec-rem)/step.sec)*100) : 0;
  const circ = Math.round(2*Math.PI*70);
  const col = iColor(step.intensity);
  const totalSec = steps.reduce((a,x)=>a+x.sec,0);
  let elapsedSec = 0; for (let i=0;i<idx;i++) elapsedSec += steps[i].sec;
  elapsedSec += step.sec - rem;
  const overallPct = totalSec ? Math.round((elapsedSec/totalSec)*100) : 0;

  return html`
    <div>
      <div style=${{display:"flex",gap:2,marginBottom:18}}>
        ${steps.map((_,i)=>html`<div key=${i} style=${{flex:1,height:3,borderRadius:2,background:i<idx?col:i===idx?col:"var(--color-border-tertiary)",opacity:i<=idx?1:0.5,transition:"all 0.3s"}}></div>`)}
      </div>
      <p style=${{textAlign:"center",margin:"0 0 4px",fontSize:12,color:"var(--color-text-tertiary)"}}>Steg ${idx+1} / ${steps.length}</p>
      <div style=${{textAlign:"center"}}>
        <div style=${{display:"inline-block",padding:"4px 14px",borderRadius:20,background:col,color:"#fff",fontSize:14,fontWeight:600,marginBottom:6}}>
          ${iLabel(step.intensity)}
        </div>
        <p style=${{margin:"0 0 14px",fontSize:14,color:"var(--color-text-secondary)"}}>${step.label}</p>
      </div>
      <div style=${{position:"relative",width:160,height:160,margin:"0 auto 20px"}}>
        <svg width="160" height="160" style=${{transform:"rotate(-90deg)"}}>
          <circle cx="80" cy="80" r="70" fill="none" stroke="var(--color-border-tertiary)" stroke-width="7"/>
          <circle cx="80" cy="80" r="70" fill="none" stroke=${col} stroke-width="7"
            stroke-dasharray="${circ} ${circ}" stroke-dashoffset="${Math.round(circ*(1-pct/100))}"
            stroke-linecap="round" style=${{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style=${{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style=${{fontSize:38,fontWeight:500,letterSpacing:"-0.02em",fontVariantNumeric:"tabular-nums"}}>${m>0?`${m}:${pad(s)}`:s}</span>
        </div>
      </div>
      ${next && html`<p style=${{textAlign:"center",margin:"0 0 16px",fontSize:13,color:"var(--color-text-tertiary)"}}>Neste: ${iLabel(next.intensity)} · ${durText(next.sec)}</p>`}
      <div style=${{display:"flex",gap:10,marginBottom:10}}>
        <button onClick=${toggleRun} class=${running?"":"btn-primary"} style=${{flex:2,padding:"14px",fontSize:16}}>
          <i class=${`ti ${running?"ti-player-pause":"ti-player-play"}`}></i> ${running?"Pause":"Start"}
        </button>
        <button onClick=${advance} style=${{flex:1,padding:"14px",fontSize:14,color:"var(--color-text-secondary)"}}>
          Hopp <i class="ti ti-player-skip-forward"></i>
        </button>
      </div>
      <button onClick=${()=>setLocked(true)} style=${{width:"100%",padding:"12px",fontSize:14,marginBottom:10}}>
        <i class="ti ti-lock"></i> Lås skjerm (lommesikker)
      </button>
      <button onClick=${onExit} style=${{width:"100%",padding:"11px",fontSize:13,color:"var(--color-text-secondary)"}}>
        <i class="ti ti-x"></i> Avslutt guidet økt
      </button>
      ${locked && html`
        <div style=${{position:"fixed",inset:0,zIndex:1000,background:"var(--color-background-secondary)",display:"flex",flexDirection:"column",padding:"22px 20px",boxSizing:"border-box"}}>
          <div style=${{display:"flex",gap:2,marginBottom:10}}>
            ${steps.map((_,i)=>html`<div key=${i} style=${{flex:1,height:6,borderRadius:3,background:i<=idx?col:"var(--color-border-tertiary)",opacity:i<=idx?1:0.5}}></div>`)}
          </div>
          <p style=${{textAlign:"center",margin:0,fontSize:17,fontWeight:500,color:"var(--color-text-secondary)"}}>Steg ${idx+1} / ${steps.length} · ${overallPct}%</p>
          <div style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
            <div style=${{display:"inline-block",padding:"12px 34px",borderRadius:34,background:col,color:"#fff",fontSize:34,fontWeight:700,marginBottom:16}}>${iLabel(step.intensity)}</div>
            <p style=${{margin:"0 0 16px",fontSize:28,fontWeight:600,color:"var(--color-text-secondary)"}}>${step.label}</p>
            <div style=${{fontSize:72,fontWeight:600,fontVariantNumeric:"tabular-nums",lineHeight:1}}>${m>0?`${m}:${pad(s)}`:s}</div>
          </div>
          <button onPointerDown=${startUnlock} onPointerUp=${cancelUnlock} onPointerLeave=${cancelUnlock} onPointerCancel=${cancelUnlock}
            style=${{padding:"18px",fontSize:16,borderRadius:30,border:"1px solid var(--color-border-secondary)"}}>
            <i class="ti ti-lock-open"></i> ${unlockHint ? "Hold inne…" : "Hold for å låse opp"}
          </button>
        </div>`}
      ${shield && html`<div style=${{position:"fixed",inset:0,zIndex:1001}} onClick=${e=>{e.stopPropagation();e.preventDefault();}} onPointerDown=${e=>{e.stopPropagation();e.preventDefault();}}></div>`}
    </div>
  `;
}

// Konfig før guidet økt (velg antall/varighet for ranges)
function GuidedConfig({ session, voiceOn, setVoiceOn, voiceURI, setVoiceURI, onStart, onCancel }) {
  const initial = {};
  session.segments.forEach((seg,i)=>{
    if (seg.repeatsRange) initial[i] = { reps: seg.repeatsRange[0] };
    else if (seg.durationRangeSec) initial[i] = { sec: seg.durationRangeSec[0] };
  });
  const [choices, setChoices] = useState(initial);
  const hasRanges = Object.keys(initial).length > 0;
  const setReps = (i,v,seg)=>setChoices(c=>({...c,[i]:{reps:Math.min(seg.repeatsRange[1],Math.max(seg.repeatsRange[0],v))}}));
  const setSec  = (i,v,seg)=>setChoices(c=>({...c,[i]:{sec:Math.min(seg.durationRangeSec[1],Math.max(seg.durationRangeSec[0],v))}}));

  return html`
    <div>

            if (seg.durationRangeSec) return html`

                <span style=${{fontSize:14}}>${iLabel(seg.intensity)}</span>

                  <button onClick=${()=>setSec(i,(choices[i].sec)-60,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>−</button>
                  <span style=${{minWidth:52,textAlign:"center",fontSize:15,fontWeight:500}}>${durText(choices[i].sec)}</span>
                  <button onClick=${()=>setSec(i,(choices[i].sec)+60,seg)} style=${{width:32,height:32,padding:0,fontSize:18}}>+</button>

            return null;

      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"16px 18px",marginBottom:16}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

function SessionView({ session, week, log, unit, voiceOn, setVoiceOn, voiceURI, setVoiceURI, stravaConnected, onBack, onSave, onDelete }) {
  const rec = log[session.id] || {};
  const [mode, setMode] = useState("detail"); // detail | config | guided
  const [choices, setChoices] = useState(null);
  const [doneDate, setDoneDate] = useState(rec.done_date || todayKey());
  const [easy, setEasy] = useState(rec.easy_kmh ?? null);
  const [thr, setThr] = useState(rec.threshold_kmh ?? null);
  const [note, setNote] = useState(rec.note || "");
  const done = !!rec.done;
  const [sBusy, setSBusy] = useState(false);
  const [sMsg, setSMsg] = useState("");
  const [picks, setPicks] = useState(null);
  const [justSaved, setJustSaved] = useState(false);
  const useActivity = async (a) => {
    setSBusy(true); setPicks(null); setSMsg("");
    const s = await stravaCall({ action:"streams", id: a.id });
    setSBusy(false);
    if (!s || s.error || !s.velocity) { setSMsg("Kunne ikke hente fartsdata."); return; }
    const p = splitPaces(s.velocity);
    if (!p) { setSMsg("For lite fartsdata til å splitte."); return; }
    setEasy(p.easy_kmh); setThr(p.work_kmh);
    setSMsg(`Hentet fra «${a.name}». Sjekk og juster ved behov.`);
  };
  const hentStrava = async () => {
    setSBusy(true); setSMsg(""); setPicks(null);
    const r = await stravaCall({ action:"activities", date: doneDate });
    if (!r || r.error || !r.activities) { setSBusy(false); setSMsg("Kunne ikke hente fra Strava."); return; }
    if (r.activities.length === 0) { setSBusy(false); setSMsg("Fant ingen Strava-økt på " + doneDate + "."); return; }
    if (r.activities.length === 1) { await useActivity(r.activities[0]); return; }
    setSBusy(false); setPicks(r.activities);
  };

  const save = (markDone) => {
    onSave({
      session_id: session.id,
      week: session.week,
      done: markDone,
      done_date: markDone ? doneDate : null,
      easy_kmh: easy, threshold_kmh: thr, note: note || null,

  if (mode === "guided") return html`<${GuidedSession} session=${session} choices=${choices}
    voiceOn=${voiceOn} voiceURI=${voiceURI}
    onExit=${()=>setMode("detail")} onFinish=${()=>{save(true);setMode("detail");}}/>`;

  return html`
    <div>
      <button onClick=${onBack} style=${{background:"none",border:"none",color:"var(--color-text-secondary)",fontSize:14,padding:"0 0 14px",cursor:"pointer"}}>
        <i class="ti ti-arrow-left"></i> Uke ${session.week}
      </button>

      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <h1 style=${{margin:0,fontSize:22,fontWeight:600}}>${session.plannedDay}</h1>
        ${done && html`<span style=${{fontSize:13,color:"var(--color-text-success)",fontWeight:500}}><i class="ti ti-circle-check"></i> Gjort ${rec.done_date||""}</span>`}
      </div>
      ${session.optional && html`<span style=${{display:"inline-block",fontSize:12,background:"var(--color-background-info)",color:"var(--color-text-info)",padding:"2px 10px",borderRadius:6,marginBottom:8}}>Valgfri</span>`}
      <p style=${{margin:"0 0 16px",fontSize:14,color:"var(--color-text-secondary)"}}>${segmentSummary(session)} · ca. ${sessionMinutes(session)} min</p>

      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"18px",marginBottom:14}}>
        <${SegmentList} session=${session}/>
      </div>

      <button onClick=${()=>setMode("config")} class="btn-blue" style=${{width:"100%",padding:"14px",fontSize:15,marginBottom:16}}>
        <i class="ti ti-player-play"></i> Start guidet økt
      </button>

      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"18px",marginBottom:14}}>
        <p style=${{margin:"0 0 14px",fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Logg økten</p>

function LineChart({ points, unit }) {
  const W = 300, H = 130, pad = 24;
  const vals = points.map(p => unit==="pace" ? 3600/p.kmh : p.kmh); // pace i sek/km
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max-min) || 1;
  const x = i => pad + (i/(points.length-1))*(W-2*pad);
  const y = v => {
    // for pace: lavere = bedre → vis lav verdi høyt oppe
    const norm = unit==="pace" ? (v-min)/span : (max-v)/span;
    return pad + norm*(H-2*pad);
  };
  const path = vals.map((v,i)=>`${i===0?"M":"L"} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ");
  const fmt = (kmh) => unit==="pace" ? kmhToPace(kmh) : kmh;
  return html`
    <svg viewBox="0 0 ${W} ${H}" style=${{width:"100%",height:"auto",display:"block"}}>
      <path d=${path} fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${vals.map((v,i)=>html`<circle key=${i} cx=${x(i)} cy=${y(v)} r="3.5" fill="#1D9E75"/>`)}
      <text x=${pad} y="12" font-size="10" fill="var(--color-text-tertiary)">${fmt(points[0].kmh)}</text>
      <text x=${W-pad} y=${H-6} font-size="10" fill="var(--color-text-tertiary)" text-anchor="end">${fmt(points[points.length-1].kmh)}</text>
    </svg>
  `;
}

// ─── INNLOGGING ───────────────────────────────────────────────────────────────
function LoginScreen() {
  const [mode, setMode] = useState("signin"); // signin | signup
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const msg = (error) => {
    const m = (error.message || "").toLowerCase();
    if (m.includes("already registered") || m.includes("already been registered")) return "Denne e-posten har allerede en konto. Velg «Logg inn».";
    if (m.includes("at least") || m.includes("password should")) return "Passordet må være minst 6 tegn.";
    if (m.includes("invalid login") || m.includes("invalid credentials")) return "Feil e-post eller passord.";
    return error.message;
  };
  const submit = async () => {
    const e = email.trim();
    if (!e || !pw) return;
    setBusy(true); setErr("");
    const { error } = mode === "signup"
      ? await db.auth.signUp({ email: e, password: pw })
      : await db.auth.signInWithPassword({ email: e, password: pw });
    setBusy(false);
    if (error) setErr(msg(error));
    // Ved suksess oppdaterer onAuthStateChange appen -> innlogget
  };
  return html`
    <div style=${{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"24px",maxWidth:420,margin:"0 auto"}}>
      <div style=${{textAlign:"center",marginBottom:28}}>
        <div style=${{fontSize:44,marginBottom:8}}>🏃</div>
        <h1 style=${{margin:0,fontSize:24,fontWeight:600}}>Løpeprogram</h1>
        <p style=${{margin:"6px 0 0",fontSize:14,color:"var(--color-text-secondary)"}}>${mode==="signup" ? "Opprett din egen treningslogg" : "Logg inn for din egen treningslogg"}</p>
      </div>
      <div style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",border:"0.5px solid var(--color-border-tertiary)",padding:"20px"}}>
        <label style=${{display:"block",fontSize:13,color:"var(--color-text-secondary)",marginBottom:6}}>E-post</label>
        <input type="email" inputmode="email" autocomplete="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="deg@epost.no"
          style=${{width:"100%",boxSizing:"border-box",marginBottom:12}}/>
        <label style=${{display:"block",fontSize:13,color:"var(--color-text-secondary)",marginBottom:6}}>Passord</label>
        <input type="password" autocomplete=${mode==="signup"?"new-password":"current-password"} value=${pw} onInput=${e=>setPw(e.target.value)} placeholder=${mode==="signup"?"Minst 6 tegn":"Passord"}
          onKeyDown=${e=>{ if(e.key==="Enter") submit(); }}
          style=${{width:"100%",boxSizing:"border-box",marginBottom:12}}/>
        ${err && html`<p style=${{margin:"0 0 10px",fontSize:13,color:"#ff3b30"}}>${err}</p>`}
        <button onClick=${submit} disabled=${busy||!email.trim()||!pw} class="btn-primary" style=${{width:"100%",padding:"14px",fontSize:15}}>
          ${busy ? "Vent…" : (mode==="signup" ? "Opprett konto" : "Logg inn")}
        </button>
        <button onClick=${()=>{ setMode(mode==="signup"?"signin":"signup"); setErr(""); }} style=${{width:"100%",marginTop:12,padding:"8px",fontSize:13,background:"none",border:"none",color:"var(--color-text-info)"}}>
          ${mode==="signup" ? "Har du konto? Logg inn" : "Ny her? Opprett konto"}
        </button>
      </div>
      <p style=${{margin:"14px 4px 0",fontSize:12,color:"var(--color-text-tertiary)",textAlign:"center"}}>Du forblir innlogget. iPhone kan lagre passordet og fylle det inn med Face ID.</p>
    </div>`;
}

  const [voiceOn, setVoiceOnState] = useState(() => localStorage.getItem("voiceOn") !== "0");
  const [voiceURI, setVoiceURIState] = useState(() => localStorage.getItem("voiceURI") || "");
  const setVoiceOn = (v) => { setVoiceOnState(v); localStorage.setItem("voiceOn", v ? "1" : "0"); };

    else if (darkMode === "light") body.classList.add("force-light");

    return ()=>{ try { sub.subscription.unsubscribe(); } catch {} };
  },[]);
  useEffect(()=>{ if(session){ (async()=>{
    setLog(await loadLog()); setReady(true);
    try {
      const code = new URLSearchParams(location.search).get("code");
      if (code) { await stravaCall({ action:"exchange", code }); history.replaceState({}, "", location.pathname); }
      const st = await stravaCall({ action:"status" });
      setStravaConnected(!!(st && st.connected));
    } catch {}
  })(); } },[session]);
  const logout = async ()=>{ await db.auth.signOut(); setLog({}); setReady(false); setView({name:"list"}); setTab("program"); setStravaConnected(false); };
  const connectStrava = () => {
    const redirect = location.origin + location.pathname;
    location.href = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=code&approval_prompt=auto&scope=activity:read_all`;
  };
  const disconnectStrava = async () => { await stravaCall({ action:"disconnect" }); setStravaConnected(false); };

  const saveRec = async (row) => {
    setLog(l => ({ ...l, [row.session_id]: { ...l[row.session_id], ...row } }));
    setSyncing(true); await saveSession(row); setSyncing(false);
  };
  const deleteRec = async (id) => {
    setLog(l => { const n = { ...l }; delete n[id]; return n; });
    setSyncing(true); await removeSession(id); setSyncing(false);
    setView({ name: "list" });
  };

  const openWeek = (wk) => setView({ name: "week", week: wk });
  const openSession = (s) => setView({ name: "session", week: s.week, sessionId: s.id });

  const weekObj = (wk) => PROGRAM.weeks.find(w => w.week === wk);
  const sessionObj = (wk, id) => { const w = weekObj(wk); const s = w.sessions.find(x=>x.id===id); return s ? { ...s, week: wk } : null; };

  if (!authReady) return html`<div style=${{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--color-text-secondary)"}}>Laster…</div>`;
  if (!session) return html`<${LoginScreen}/>`;

  let body;
  if (!ready) body = html`<p style=${{color:"var(--color-text-secondary)",textAlign:"center",paddingTop:40}}>Laster...</p>`;
  else if (tab === "stats") body = html`<${StatsView} log=${log} unit=${unit}/>`;
  else if (view.name === "week") body = html`<${WeekView} key=${"w"+view.week} week=${weekObj(view.week)} log=${log} onBack=${()=>setView({name:"list"})} onOpen=${openSession}/>`;
  else if (view.name === "session") body = html`<${SessionView} key=${view.sessionId} session=${sessionObj(view.week, view.sessionId)} week=${weekObj(view.week)} log=${log} unit=${unit} voiceOn=${voiceOn} setVoiceOn=${setVoiceOn} voiceURI=${voiceURI} setVoiceURI=${setVoiceURI} stravaConnected=${stravaConnected} onBack=${()=>setView({name:"week",week:view.week})} onSave=${saveRec} onDelete=${deleteRec}/>`;
  else body = html`<${ProgramView} log=${log} onOpenWeek=${openWeek} onOpenSession=${openSession} stravaConnected=${stravaConnected} onConnectStrava=${connectStrava} onDisconnectStrava=${disconnectStrava}/>`;

  const title = tab==="stats" ? "Statistikk" : "Løpeprogram";

  return html`
    <div style=${{fontFamily:"var(--font-sans)",background:"var(--color-background-secondary)",display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style=${{background:"var(--color-background-primary)",borderBottom:"0.5px solid var(--color-border-tertiary)",padding:"14px 18px 12px",flexShrink:0,position:"sticky",top:0,zIndex:10}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style=${{margin:0,fontSize:18,fontWeight:600}}>${title}</p>
          <div style=${{display:"flex",alignItems:"center",gap:6}}>
            ${syncing && html`<span style=${{fontSize:11,color:"var(--color-text-tertiary)"}}>Lagrer...</span>`}
            <button onClick=${toggleUnit} style=${{background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-tertiary)",padding:"5px 10px",fontSize:12,cursor:"pointer",color:"var(--color-text-secondary)",borderRadius:6}} title="Bytt enhet">
              ${unit==="pace"?"min/km":"km/t"}
            </button>
            <button onClick=${toggleDark} style=${{background:"none",border:"none",padding:"4px 6px",fontSize:18,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1}} title="Bytt tema">
              ${darkMode==="dark"?"☀️":darkMode==="light"?"🌓":"🌙"}
            </button>
            <button onClick=${()=>setConfirmLogout(true)} style=${{background:"none",border:"none",padding:"4px 6px",fontSize:16,cursor:"pointer",color:"var(--color-text-secondary)",lineHeight:1}} title="Logg ut">
              <i class="ti ti-logout"></i>
            </button>
          </div>
        </div>
      </div>
      <div style=${{flex:1,padding:"16px",overflowY:"auto",paddingBottom:80}}>${body}</div>
      <nav style=${{background:"var(--color-background-primary)",borderTop:"0.5px solid var(--color-border-tertiary)",display:"flex",height:66,flexShrink:0,position:"fixed",bottom:0,left:0,right:0,maxWidth:480,margin:"0 auto"}}>
        ${[{id:"program",icon:"ti-run",label:"Program"},{id:"stats",icon:"ti-chart-line",label:"Statistikk"}].map(t => html`
          <button key=${t.id} onClick=${()=>{setTab(t.id);if(t.id==="program")setView({name:"list"});}} style=${{
            flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:0,
            color:tab===t.id?"#1D9E75":"var(--color-text-secondary)"}}>
            <i class=${`ti ${t.icon}`} style=${{fontSize:22}}></i>
            <span style=${{fontSize:11,fontWeight:tab===t.id?500:400}}>${t.label}</span>
          </button>`)}
      </nav>
      ${confirmLogout && html`
        <div style=${{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${()=>setConfirmLogout(false)}>
          <div onClick=${e=>e.stopPropagation()} style=${{background:"var(--color-background-primary)",borderRadius:"var(--border-radius-lg)",padding:"22px",maxWidth:320,width:"100%",textAlign:"center"}}>
            <p style=${{margin:"0 0 4px",fontSize:17,fontWeight:600}}>Logge ut?</p>
            <p style=${{margin:"0 0 18px",fontSize:14,color:"var(--color-text-secondary)"}}>Du må logge inn igjen med e-post og passord.</p>
            <button onClick=${()=>{ setConfirmLogout(false); logout(); }} style=${{width:"100%",padding:"13px",fontSize:15,marginBottom:8,background:"#ff3b30",color:"#fff",border:"none"}}>Logg ut</button>
            <button onClick=${()=>setConfirmLogout(false)} style=${{width:"100%",padding:"12px",fontSize:14,color:"var(--color-text-secondary)"}}>Avbryt</button>
          </div>
        </div>`}
    </div>
  `;
}

const _rootEl = document.getElementById('root');
_rootEl.innerHTML = '';
render(html`<${App}/>`, _rootEl);
</script>
</body>
</html>
